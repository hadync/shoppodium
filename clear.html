<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Clearing cache...</title>
<style>
body { background:#080808; color:#fff; font-family:sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; flex-direction:column; gap:16px; }
p { color:#888; font-size:14px; }
</style>
</head>
<body>
<p>Clearing app cache...</p>
<script>
async function nuke() {
  // Unregister all service workers
  if ('serviceWorker' in navigator) {
    const regs = await navigator.serviceWorker.getRegistrations();
    await Promise.all(regs.map(r => r.unregister()));
  }
  // Delete all caches
  const keys = await caches.keys();
  await Promise.all(keys.map(k => caches.delete(k)));
  // Done — go home
  window.location.replace('/');
}
nuke();
</script>
</body>
</html>
