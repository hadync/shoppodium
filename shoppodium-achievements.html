<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Record · ShopPodium</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/icon-180-v2.png">
<meta name="theme-color" content="#060606">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#060606;--card:#0d0c0a;--card-lit:#12100c;--inset:#0a0908;
  --ink:#faf8f4;--ink-soft:#c9c5be;--dim:#8f8a82;--dim2:#6b665f;--faint:#5a5a62;--locked:#3a372f;
  --line:#181614;--line-2:#2b2822;--green:#22c55e;--accent:#18aef0;
  --chakra:"Chakra Petch",sans-serif;--jakarta:"Plus Jakarta Sans",-apple-system,"Segoe UI",sans-serif;
}
html,body{background:var(--bg);color:var(--ink);font-family:var(--jakarta);-webkit-font-smoothing:antialiased;min-height:100vh}
.nav{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(6,6,6,.97);backdrop-filter:blur(20px);z-index:200}
.nav-brand{font-family:var(--chakra);font-size:16px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;color:var(--ink)}
.nav-brand span{color:var(--accent)}
.nav-back{font-size:11px;font-weight:600;letter-spacing:.02em;color:var(--dim);text-decoration:none}
.page{max-width:480px;margin:0 auto;padding-bottom:110px}

/* HEADER */
.head{padding:28px 20px 20px}
.head-eyebrow{font-family:var(--jakarta);font-size:9.5px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--dim2);margin-bottom:8px}
.head-name{font-family:var(--chakra);font-size:30px;font-weight:700;line-height:1;letter-spacing:.02em;text-transform:uppercase}

/* SNAPSHOT */
.snap{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--line);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.snap-cell{background:var(--bg);padding:18px 18px}
.snap-num{font-family:var(--chakra);font-size:30px;font-weight:700;line-height:1;color:var(--ink);margin-bottom:5px}
.snap-lbl{font-family:var(--jakarta);font-size:9px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--dim2)}

/* CLOSEST MILESTONE (hero) */
.closest{padding:26px 20px;border-bottom:1px solid var(--line)}
.closest-eyebrow{font-family:var(--jakarta);font-size:9.5px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--dim2);margin-bottom:16px}
.closest-num{font-family:var(--chakra);font-size:64px;font-weight:700;line-height:.9;color:var(--ink)}
.closest-cat{font-family:var(--jakarta);font-size:12px;font-weight:600;color:var(--dim);margin-top:6px;letter-spacing:.01em}
.closest-track{height:2px;background:var(--line-2);margin:18px 0 8px;overflow:hidden;border-radius:2px}
.closest-fill{height:100%;background:var(--accent);width:0;transition:width 1s cubic-bezier(.34,1.2,.5,1)}
.closest-away{font-family:var(--jakarta);font-size:12px;color:var(--dim)}
.closest-away b{font-family:var(--chakra);font-weight:700;font-size:15px;color:var(--ink);letter-spacing:.01em}

/* WALL */
.wall-head{padding:22px 20px 12px}
.wall-title{font-family:var(--jakarta);font-size:9.5px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--dim2)}
.wall{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.tile{background:var(--card);padding:18px 16px;display:flex;flex-direction:column;min-height:150px;position:relative}

/* EARNED, bright */
.tile.earned{background:var(--card-lit);border-left:2px solid rgba(250,248,244,.55)}
.tile-status{font-family:var(--jakarta);font-size:8px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;margin-bottom:12px}
.tile.earned .tile-status{color:var(--dim)}
.tile-num{font-family:var(--chakra);font-size:44px;font-weight:700;line-height:1;letter-spacing:0;color:var(--ink)}
.tile-cat{font-family:var(--jakarta);font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-top:4px;margin-bottom:auto}
.tile-date{font-family:var(--jakarta);font-size:9px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--dim);margin-top:12px}
.tile-share{margin-top:10px;padding:9px 0;background:none;border:1px solid var(--line-2);color:var(--ink-soft);font-family:var(--jakarta);font-size:12px;font-weight:600;letter-spacing:.01em;cursor:pointer;border-radius:7px;width:100%;transition:border-color .15s,color .15s,background .15s}
.tile-share:active,.tile-share:hover{border-color:var(--ink);background:var(--ink);color:#08080a}

/* LOCKED, dim */
.tile.locked .tile-status{color:var(--locked)}
.tile.locked .tile-num{color:var(--locked)}
.tile.locked .tile-cat{color:var(--dim2)}
.tile-away{font-family:var(--jakarta);font-size:11px;font-weight:500;color:var(--dim);margin-top:12px}
.tile-away b{font-family:var(--chakra);font-weight:700;font-size:14px;color:var(--ink-soft);letter-spacing:.01em}
.tile-bar{height:1px;background:var(--line-2);margin-top:9px;overflow:hidden}
.tile-bar-fill{height:100%;background:var(--faint);width:0}

/* MOBILE NAV */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(6,6,6,.97);border-top:1px solid var(--line);backdrop-filter:blur(20px);z-index:200;padding:0 0 env(safe-area-inset-bottom,0)}
.mobile-nav-inner{display:grid;grid-template-columns:repeat(5,1fr)}
.mnav{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 4px;text-decoration:none;color:var(--dim2);cursor:pointer;background:none;border:none;border-top:2px solid transparent}
.mnav.active{color:var(--ink);border-top-color:var(--accent)}
.mnav-lbl{font-family:var(--chakra);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.mnav.log{border-top:none;padding:8px 4px}
.mnav.log .ico{width:44px;height:44px;border-radius:50%;background:var(--ink);display:flex;align-items:center;justify-content:center}
.mnav.log svg{color:#08080a;width:20px;height:20px}
@media(max-width:768px){.mobile-nav{display:block}.page{padding-bottom:84px}}
</style>
</head>
<body>

<div class="nav">
  <a href="index.html" class="nav-brand">Shop<span>Podium</span></a>
  <a href="app2.html" class="nav-back">← Dashboard</a>
</div>

<div class="page">

  <div class="head">
    <div class="head-eyebrow">Career Record</div>
    <div class="head-name" id="shopName">Loading…</div>
  </div>

  <div class="snap">
    <div class="snap-cell"><div class="snap-num" id="snapTotal">0</div><div class="snap-lbl">Installs</div></div>
    <div class="snap-cell"><div class="snap-num" id="snapEarned">0</div><div class="snap-lbl">Milestones</div></div>
    <div class="snap-cell"><div class="snap-num" id="snapBest">0</div><div class="snap-lbl">Best Month</div></div>
  </div>

  <div class="closest" id="closest" style="display:none">
    <div class="closest-eyebrow">Closest milestone</div>
    <div class="closest-num" id="closestNum"></div>
    <div class="closest-cat" id="closestCat"></div>
    <div class="closest-track"><div class="closest-fill" id="closestFill"></div></div>
    <div class="closest-away"><b id="closestAway">0</b> <span id="closestAwayUnit">away</span></div>
  </div>

  <div class="wall-head"><div class="wall-title">Career Installs</div></div>
  <div class="wall" id="installWall"></div>

  <div class="wall-head"><div class="wall-title">Monthly Volume</div></div>
  <div class="wall" id="monthWall"></div>

  <div class="wall-head"><div class="wall-title">Repeat Clients</div></div>
  <div class="wall" id="repeatWall"></div>

</div>

<div class="mobile-nav">
  <div class="mobile-nav-inner">
    <a class="mnav" href="app2.html"><span class="mnav-lbl">Home</span></a>
    <a class="mnav" href="shoppodium-cards.html"><span class="mnav-lbl">Repost</span></a>
    <a class="mnav log" href="shoppodium-logjob.html"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></span></a>
    <a class="mnav" href="shoppodium-thankyou.html"><span class="mnav-lbl">Jobs</span></a>
    <a class="mnav active" href="shoppodium-achievements.html"><span class="mnav-lbl">Career</span></a>
  </div>
</div>

<script>
const SUPABASE_URL='https://cajerxgiwbgevfjzkkoy.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNhamVyeGdpd2JnZXZmanpra295Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NDY0NDcsImV4cCI6MjA5NjAyMjQ0N30.8dCTpfeWkdUIjmKGgfnrOqlBa1jIwDt_yqg3Dlt1a0M';
const{createClient}=supabase;
const sb=createClient(SUPABASE_URL,SUPABASE_KEY);

let profile={};

// Milestones, based on ALL logged jobs
const INSTALL_MS=[1,10,25,50,100,250,500,1000];
const MONTH_MS=[10,20,30,40,50];
const REPEAT_MS=[5,10,25,50,100];

function set(id,v){const el=document.getElementById(id);if(el)el.textContent=v}
function applyAccent(hex){if(hex&&/^#[0-9a-fA-F]{6}$/.test(hex))document.documentElement.style.setProperty('--accent',hex)}
function fmtN(n){return n>=1000?n.toLocaleString():String(n)}
function fmtMonthYear(d){return d.toLocaleDateString('en-US',{month:'short',year:'numeric'})}
function earnedDate(sortedAsc,threshold){return sortedAsc.length<threshold?null:new Date(sortedAsc[threshold-1].created_at)}

// ── TILE ────────────────────────────────────────────────────────────────────
function buildTile(threshold,current,category,earnedAt){
  const earned=current>=threshold;
  if(earned){
    const d=earnedAt?fmtMonthYear(earnedAt):'Earned';
    return `<div class="tile earned">
      <div class="tile-status">Earned</div>
      <div class="tile-num">${fmtN(threshold)}</div>
      <div class="tile-cat">${category}</div>
      <div class="tile-date">${d}</div>
      <button class="tile-share" onclick="shareMilestone(${threshold},'${category.replace(/'/g,"\\'")}','${d}')">Share</button>
    </div>`;
  }
  const away=threshold-current;
  const pct=Math.max(0,Math.min(100,Math.round((current/threshold)*100)));
  return `<div class="tile locked">
    <div class="tile-status">Locked</div>
    <div class="tile-num">${fmtN(threshold)}</div>
    <div class="tile-cat">${category}</div>
    <div class="tile-away"><b>${fmtN(away)}</b> away</div>
    <div class="tile-bar"><div class="tile-bar-fill" style="width:${pct}%"></div></div>
  </div>`;
}

// ── SHARE CARD (canvas, warm record aesthetic) ──────────────────────────────
async function shareMilestone(threshold,category,dateStr){
  try{ if(document.fonts&&document.fonts.ready) await document.fonts.ready; }catch(e){}
  const S=1080, canvas=document.createElement('canvas');
  canvas.width=S;canvas.height=S;
  const ctx=canvas.getContext('2d');
  const accent=getComputedStyle(document.documentElement).getPropertyValue('--accent').trim()||'#18aef0';
  const shop=(profile.shop_name||profile.full_name||'ShopPodium').toUpperCase();

  ctx.fillStyle='#060606';ctx.fillRect(0,0,S,S);
  ctx.fillStyle=accent;ctx.fillRect(0,0,6,S);                 // one structural accent (left rule)

  ctx.textAlign='left';
  ctx.fillStyle='#8f8a82';
  ctx.font='700 30px "Chakra Petch", sans-serif';
  ctx.fillText(shop,86,120);

  ctx.fillStyle='#5a5a62';
  ctx.font='500 25px "Plus Jakarta Sans", sans-serif';
  ctx.fillText('ON THE RECORD',86,162);

  const numStr=fmtN(threshold);
  const fs=numStr.length>=5?300:numStr.length>=4?360:420;
  ctx.fillStyle='#faf8f4';
  ctx.font=`700 ${fs}px "Chakra Petch", sans-serif`;
  ctx.fillText(numStr,80,640);

  ctx.fillStyle='#c9c5be';
  ctx.font='700 44px "Chakra Petch", sans-serif';
  ctx.fillText(category.toUpperCase(),86,716);

  ctx.fillStyle='#8f8a82';
  ctx.font='500 29px "Plus Jakarta Sans", sans-serif';
  ctx.fillText('EARNED · '+dateStr.toUpperCase(),86,776);

  ctx.font='700 25px "Chakra Petch", sans-serif';
  ctx.fillStyle='#5a5a62';ctx.fillText('SHOPPODIUM',86,1006);

  const finish=(blob,dataUrl)=>{
    const fn=`${(profile.shop_name||'shop').replace(/\s+/g,'-').toLowerCase()}-${threshold}-${category.replace(/\s+/g,'-').toLowerCase()}.png`;
    if(blob&&navigator.share&&navigator.canShare){
      const file=new File([blob],fn,{type:'image/png'});
      if(navigator.canShare({files:[file]})){ navigator.share({files:[file]}).catch(()=>{}); return; }
    }
    const a=document.createElement('a');a.download=fn;a.href=dataUrl;a.click();
  };
  if(canvas.toBlob){ canvas.toBlob(b=>finish(b,canvas.toDataURL('image/png')),'image/png'); }
  else { finish(null,canvas.toDataURL('image/png')); }
}

// ── INIT ────────────────────────────────────────────────────────────────────
async function init(){
  const{data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='shoppodium-signup2.html';return}
  const uid=session.user.id;

  const{data:p}=await sb.from('profiles').select('*').eq('id',uid).single();
  profile=p||{};
  applyAccent(profile.accent_color);
  set('shopName',profile.shop_name||profile.full_name||'My Shop');

  const{data:rawJobs}=await sb.from('jobs').select('*').eq('tinter_id',uid).order('created_at',{ascending:true});
  const jobs=rawJobs||[];
  const total=jobs.length;

  const monthMap={};
  jobs.forEach(j=>{if(!j.created_at)return;const d=new Date(j.created_at);const k=d.getFullYear()+'-'+d.getMonth();monthMap[k]=(monthMap[k]||0)+1});
  const bestMonth=Object.values(monthMap).length?Math.max(...Object.values(monthMap)):0;

  const phoneCounts={};
  jobs.forEach(j=>{if(j.customer_phone)phoneCounts[j.customer_phone]=(phoneCounts[j.customer_phone]||0)+1});
  const repeatClients=Object.values(phoneCounts).filter(c=>c>1).length;

  const earnedCount=INSTALL_MS.filter(m=>total>=m).length+MONTH_MS.filter(m=>bestMonth>=m).length+REPEAT_MS.filter(m=>repeatClients>=m).length;
  set('snapTotal',fmtN(total));
  set('snapEarned',earnedCount);
  set('snapBest',bestMonth);

  // ── CLOSEST MILESTONE (nearest unearned across all categories) ──
  const candidates=[
    {ms:INSTALL_MS,cur:total,cat:'Career Installs'},
    {ms:MONTH_MS,cur:bestMonth,cat:'in a Month'},
    {ms:REPEAT_MS,cur:repeatClients,cat:'Repeat Clients'},
  ].map(c=>{const next=c.ms.find(m=>c.cur<m);return next?{...c,next,away:next-c.cur}:null}).filter(Boolean);
  if(candidates.length){
    candidates.sort((a,b)=>a.away-b.away);
    const c=candidates[0];
    document.getElementById('closest').style.display='block';
    set('closestNum',fmtN(c.next));
    set('closestCat',c.cat);
    set('closestAway',fmtN(c.away));
    set('closestAwayUnit','away');
    const pct=Math.max(2,Math.min(100,Math.round((c.cur/c.next)*100)));
    setTimeout(()=>{document.getElementById('closestFill').style.width=pct+'%'},80);
  }

  // ── WALLS ──
  document.getElementById('installWall').innerHTML=INSTALL_MS.map(m=>buildTile(m,total,'Career Installs',total>=m?earnedDate(jobs,m):null)).join('');
  document.getElementById('monthWall').innerHTML=MONTH_MS.map(m=>buildTile(m,bestMonth,'in a Month',null)).join('');
  document.getElementById('repeatWall').innerHTML=REPEAT_MS.map(m=>buildTile(m,repeatClients,'Repeat Clients',null)).join('');
}

init();
</script>
</body>
</html>
