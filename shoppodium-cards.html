<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repost · ShopPodium</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/icon-180-v2.png">
<meta name="theme-color" content="#060606">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#060606;--card:#0d0c0a;--inset:#0a0908;
  --ink:#faf8f4;--ink-soft:#c9c5be;--dim:#8f8a82;--dim2:#6b665f;--faint:#5a5a62;
  --line:#181614;--line-2:#2b2822;--green:#22c55e;--accent:#18aef0;
  --chakra:"Chakra Petch",sans-serif;--jakarta:"Plus Jakarta Sans",-apple-system,"Segoe UI",sans-serif;
}
html,body{background:var(--bg);color:var(--ink);font-family:var(--jakarta);-webkit-font-smoothing:antialiased;min-height:100vh}
.nav{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(6,6,6,.97);backdrop-filter:blur(20px);z-index:200}
.nav-brand{font-family:var(--chakra);font-size:16px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;color:var(--ink)}
.nav-brand span{color:var(--accent)}
.nav-back{font-size:11px;font-weight:600;letter-spacing:.02em;color:var(--dim);text-decoration:none}
.page{max-width:480px;margin:0 auto;padding-bottom:120px}

/* GRID OF RECENT INSTALLS */
.sec{padding:16px}
.sec-lbl{font-family:var(--jakarta);font-size:9.5px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--dim2);margin-bottom:14px}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.gcell{position:relative;aspect-ratio:1/1;border-radius:7px;overflow:hidden;cursor:pointer;background:var(--inset);border:1px solid var(--line-2)}
.gcell img{width:100%;height:100%;object-fit:cover;display:block}
.gcell:active{opacity:.75}
.gcell.sel{outline:2px solid var(--ink);outline-offset:0}
.gcell-v{position:absolute;top:5px;right:5px;width:16px;height:16px;border-radius:50%;background:rgba(6,6,6,.78);display:none;align-items:center;justify-content:center}
.gcell-v.on{display:flex}
.gcell-meta{position:absolute;left:0;right:0;bottom:0;padding:12px 6px 5px;background:linear-gradient(transparent,rgba(6,6,6,.88));font-family:var(--chakra);font-size:9.5px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;color:var(--ink-soft);line-height:1.15}
.empty{padding:42px 8px;text-align:center;font-size:12px;color:var(--dim2);line-height:1.6}

/* CARD */
.composer{display:none}
.card-wrap{padding:16px}
.card-hint{font-family:var(--jakarta);font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--faint);text-align:center;margin-bottom:10px}
.card{position:relative;aspect-ratio:1/1;width:100%;overflow:hidden;background:var(--card);border-radius:4px}
.card-photo{position:absolute;inset:0;background-size:cover;background-position:center;z-index:1}
.card-scrim{position:absolute;inset:0;z-index:2;background:linear-gradient(to bottom,rgba(6,6,6,.5) 0%,rgba(6,6,6,0) 22%,rgba(6,6,6,0) 40%,rgba(6,6,6,.72) 66%,rgba(6,6,6,.97) 100%)}
.card-rule{position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--accent);z-index:4}
.card-top{position:absolute;top:0;left:0;right:0;z-index:5;display:flex;align-items:flex-start;justify-content:space-between;padding:15px 15px 0 18px}
.card-shop-top{font-family:var(--chakra);font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--dim)}
.card-verified{display:none;align-items:center;gap:4px;font-family:var(--jakarta);font-size:9px;font-weight:700;letter-spacing:.04em;color:var(--green);background:rgba(6,6,6,.55);padding:4px 9px;border-radius:99px}
.card-body{position:absolute;left:0;right:0;bottom:0;z-index:5;padding:0 15px 16px 18px;display:flex;flex-direction:column;gap:9px}
.card-install{font-family:var(--chakra);font-weight:700;line-height:.86;letter-spacing:0;color:var(--ink)}
.card-install .np{color:var(--dim2);font-weight:600}
.card-install-lbl{display:block;font-family:var(--jakarta);font-size:9px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--dim2);margin-top:6px}
.card-veh{font-family:var(--chakra);font-size:19px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;color:var(--ink-soft);line-height:1}
.card-svc{font-family:var(--chakra);font-size:15px;font-weight:700;letter-spacing:.01em;color:var(--ink);line-height:1.1}
.card-proof{font-family:var(--jakarta);font-size:11px;font-weight:500;color:var(--dim);letter-spacing:.01em}
.card-foot{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-top:3px}
.card-foot-l{min-width:0}
.card-where{font-family:var(--jakarta);font-size:11px;font-weight:600;color:var(--ink-soft);letter-spacing:.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-mark{font-family:var(--chakra);font-size:9px;font-weight:700;letter-spacing:.3em;color:var(--faint);margin-top:5px;text-transform:uppercase}
.card-qr{flex-shrink:0;text-align:center}
.card-qr img,.card-qr canvas{width:60px;height:60px;display:block;border-radius:4px;background:#fff;padding:3px}
.card-qr-lbl{font-family:var(--jakarta);font-size:7px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-top:4px}

/* ACTIONS */
.actions{padding:14px 16px}
.btn-primary{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;background:var(--ink);color:#08080a;border:none;border-radius:8px;font-family:var(--jakarta);font-size:15px;font-weight:600;letter-spacing:.01em;cursor:pointer}
.btn-primary:active{opacity:.85}
.btn-row{display:flex;gap:8px;margin-top:8px}
.btn-ghost{flex:1;padding:12px;border:1px solid var(--line-2);border-radius:8px;background:none;color:var(--ink-soft);font-family:var(--jakarta);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-ghost:active{border-color:var(--ink);color:var(--ink)}
.flash{font-family:var(--jakarta);font-size:11px;color:var(--dim);text-align:center;min-height:16px;margin-top:10px;transition:opacity .3s;letter-spacing:.03em}
</style>
</head>
<body>

<div class="nav">
  <a href="index.html" class="nav-brand">Shop<span>Podium</span></a>
  <a href="app2.html" class="nav-back">← Dashboard</a>
</div>

<div class="page">

  <div class="sec">
    <div class="sec-lbl">Recent installs, tap one to make a card</div>
    <div class="grid" id="photoGrid"><div class="empty">Loading…</div></div>
  </div>

  <div class="composer" id="composer">
    <div class="card-wrap">
      <div class="card-hint">Tap the card to save it</div>
      <div class="card" id="card" onclick="downloadCard()">
        <div class="card-photo" id="cardPhoto"></div>
        <div class="card-scrim"></div>
        <div class="card-rule"></div>
        <div class="card-top">
          <div class="card-shop-top" id="cardShopTop"></div>
          <div class="card-verified" id="cardVerified">
            <svg width="9" height="9" viewBox="0 0 9 9" fill="none"><path d="M1 4.5l2.5 2.5L8 1.5" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Verified install
          </div>
        </div>
        <div class="card-body">
          <div>
            <div class="card-install" id="cardInstall" style="font-size:42px"><span class="np">Nº</span> <span id="cardInstallNum"></span></div>
            <span class="card-install-lbl">On the record</span>
          </div>
          <div class="card-veh" id="cardVeh"></div>
          <div class="card-svc" id="cardSvc"></div>
          <div class="card-proof" id="cardProof"></div>
          <div class="card-foot">
            <div class="card-foot-l">
              <div class="card-where" id="cardWhere"></div>
              <div class="card-mark">SHOPPODIUM</div>
            </div>
            <div class="card-qr" id="cardQrWrap">
              <div id="cardQr"></div>
              <div class="card-qr-lbl">Scan to book</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="btn-primary" onclick="downloadCard()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 10l5 5 5-5M5 21h14"/></svg>
        Download card
      </button>
      <div class="btn-row">
        <button class="btn-ghost" onclick="copyCaption()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>
          Copy caption
        </button>
      </div>
      <div class="flash" id="flash"></div>
    </div>
  </div>

</div>

<script>
const SUPABASE_URL='https://cajerxgiwbgevfjzkkoy.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNhamVyeGdpd2JnZXZmanpra295Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NDY0NDcsImV4cCI6MjA5NjAyMjQ0N30.8dCTpfeWkdUIjmKGgfnrOqlBa1jIwDt_yqg3Dlt1a0M';
const{createClient}=supabase;
const sb=createClient(SUPABASE_URL,SUPABASE_KEY);

// PACE_MIN: the pace line ("X this month") is hidden on slow months (fewer than this many).
// Never show a fake-looking low number; the record speaks for itself.
const PACE_MIN=3;

let profile={}, allJobs=[], job=null, uid=null;
let careerTotal=0, verifiedCount=0, thisMonthCount=0, bookingUrl='';

const vltClean=v=>String(v==null?'':v).replace(/[^0-9.]/g,'');
function set(id,v){const el=document.getElementById(id);if(el)el.textContent=v}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function flash(msg){const el=document.getElementById('flash');if(!el)return;el.textContent=msg;el.style.opacity='1';clearTimeout(el._t);el._t=setTimeout(()=>{el.style.opacity='0'},2500)}

// ── DERIVED NUMBERS ─────────────────────────────────────────────────────────
function computeCareer(){
  careerTotal=(parseInt(profile.installs_before)||0)+allJobs.length;
  verifiedCount=allJobs.filter(j=>j.verified).length;
  const now=new Date();
  thisMonthCount=allJobs.filter(j=>{
    if(!j.created_at)return false;
    const d=new Date(j.created_at);
    return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();
  }).length;
}

// ── SPEC / VEHICLE / PROOF ──────────────────────────────────────────────────
function vehicleLine(j){
  return [j.car_year,j.car_make,j.car_model].filter(Boolean).join(' ')||'Vehicle';
}
function serviceLine(j){
  const vlt=j.vlt_percent?vltClean(j.vlt_percent)+'%':'';
  const brand=[j.film_brand,j.film_type].filter(Boolean).join(' ');
  const jt=j.job_type||j.trade||'';
  const parts=[];
  if(brand)parts.push(brand);
  if(vlt)parts.push(vlt);
  if(!parts.length&&jt)parts.push(jt);
  return parts.join(' · ')||'Install';
}
// "128 verified by customers · 14 this month". Pace half hidden on slow months.
function proofLine(){
  const parts=[];
  if(verifiedCount>0)parts.push(verifiedCount+' verified by customer'+(verifiedCount===1?'':'s'));
  if(thisMonthCount>=PACE_MIN)parts.push(thisMonthCount+' this month');
  return parts.join(' · ');
}

// ── PHOTO GRID ──────────────────────────────────────────────────────────────
function jobsWithPhotos(){return allJobs.filter(j=>Array.isArray(j.photos)&&j.photos.length&&j.photos[0])}
function renderGrid(){
  const el=document.getElementById('photoGrid');
  const list=jobsWithPhotos();
  if(!list.length){el.innerHTML='<div class="empty">No installs with photos yet.<br>Log a job with a finished photo and it shows up here to repost.</div>';el.style.display='block';return}
  el.style.display='grid';
  el.innerHTML=list.map(j=>{
    const veh=[j.car_make,j.car_model].filter(Boolean).join(' ')||'Vehicle';
    return`<div class="gcell${job&&job.id===j.id?' sel':''}" onclick="selectJob('${j.id}')">
      <img src="${esc(j.photos[0])}" alt="" loading="lazy" crossorigin="anonymous">
      <div class="gcell-v${j.verified?' on':''}"><svg width="8" height="8" viewBox="0 0 9 9" fill="none"><path d="M1 4.5l2.5 2.5L8 1.5" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="gcell-meta">${esc(veh)}</div>
    </div>`;
  }).join('');
}

function selectJob(id){
  job=allJobs.find(j=>j.id===id);
  if(!job)return;
  renderGrid();
  composeCard();
  const c=document.getElementById('composer');
  c.style.display='block';
  c.scrollIntoView({behavior:'smooth',block:'start'});
}

// ── COMPOSE THE CARD ────────────────────────────────────────────────────────
function composeCard(){
  if(!job)return;
  const photo=document.getElementById('cardPhoto');
  if(photo){
    if(job.photos&&job.photos[0]){
      photo.style.backgroundImage=`url("${job.photos[0]}")`;
    }else{
      photo.style.backgroundImage='none';
      photo.style.background='linear-gradient(150deg,#17140f 0%,#0a0908 70%)';
    }
  }
  const shop=(profile.shop_name||profile.full_name||'ShopPodium');
  set('cardShopTop',shop.toUpperCase());

  // Install Nº = career total (the monument number). Size scales with digits.
  set('cardInstallNum',careerTotal.toLocaleString());
  const digits=String(careerTotal).length;
  const inst=document.getElementById('cardInstall');
  if(inst)inst.style.fontSize=(digits>=5?34:digits>=4?40:48)+'px';

  set('cardVeh',vehicleLine(job).toUpperCase());
  set('cardSvc',serviceLine(job));

  // Proof line, hidden if there is nothing honest to show
  const proof=proofLine();
  const pe=document.getElementById('cardProof');
  if(pe){pe.textContent=proof;pe.style.display=proof?'':'none';}

  // Verified badge only when THIS install is actually verified
  const vb=document.getElementById('cardVerified');
  if(vb)vb.style.display=job.verified?'flex':'none';

  // Footer: shop · city
  const city=[profile.city,profile.state].filter(Boolean).join(', ');
  set('cardWhere',[shop,city].filter(Boolean).join(' · '));

  renderQR();
}

// ── QR (booking link) ───────────────────────────────────────────────────────
function renderQR(){
  const wrap=document.getElementById('cardQr');
  if(!wrap)return;
  wrap.innerHTML='';
  if(!bookingUrl||typeof QRCode==='undefined'||!QRCode.toCanvas){document.getElementById('cardQrWrap').style.visibility='hidden';return}
  document.getElementById('cardQrWrap').style.visibility='visible';
  try{
    QRCode.toCanvas(bookingUrl,{margin:0,width:120,color:{dark:'#060606',light:'#ffffff'}},(err,canvas)=>{
      if(err||!canvas){document.getElementById('cardQrWrap').style.visibility='hidden';return}
      wrap.appendChild(canvas);
    });
  }catch(e){document.getElementById('cardQrWrap').style.visibility='hidden'}
}

// ── TINTER-VOICE CAPTION ────────────────────────────────────────────────────
function buildCaption(j){
  const veh=vehicleLine(j);
  const svc=serviceLine(j);
  const city=profile.city||'';
  const openers=['Knocked out','Buttoned up','Wrapped up','Dialed in','Fresh off the bench'];
  const seed=j.id?j.id.charCodeAt(0)+j.id.charCodeAt(j.id.length-1):0;
  const opener=openers[seed%openers.length];
  const tags=['#windowtint','#autotint','#tintshop'];
  if(j.film_brand)tags.push('#'+j.film_brand.replace(/[^a-z0-9]/gi,'').toLowerCase());
  if(city)tags.push('#'+city.replace(/[^a-z0-9]/gi,'').toLowerCase());
  const where=city?` · ${city}`:'';
  return `${opener} this ${veh}. ${svc}.\n\nBook through the link in bio${where}.\n\n${tags.join(' ')}`;
}

async function copyCaption(){
  if(!job)return;
  const caption=buildCaption(job);
  try{await navigator.clipboard.writeText(caption);flash('Caption copied');}
  catch(e){flash('Press and hold to copy');console.warn(e)}
}

// ── DOWNLOAD ────────────────────────────────────────────────────────────────
async function downloadCard(){
  if(!job)return;
  flash('Rendering…');
  const card=document.getElementById('card');
  try{
    const canvas=await html2canvas(card,{backgroundColor:'#060606',scale:3,useCORS:true,allowTaint:false,logging:false});
    canvas.toBlob(async blob=>{
      if(!blob){flash('Screenshot the card to save it');return}
      const shopSlug=(profile.shop_name||'install').replace(/\s+/g,'-').toLowerCase();
      const car=[job.car_year,job.car_make,job.car_model].filter(Boolean).join('-').toLowerCase()||'card';
      const filename=`${shopSlug}-${car}.png`;
      const file=new File([blob],filename,{type:'image/png'});
      if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
        try{await navigator.share({files:[file]});return}
        catch(e){if(e&&e.name==='AbortError')return}
      }
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download=filename;a.click();
      setTimeout(()=>URL.revokeObjectURL(url),1000);
      flash('Saved');
    },'image/png',1.0);
  }catch(e){flash('Screenshot the card to save it');console.error(e)}
}

// ── ACCENT ──────────────────────────────────────────────────────────────────
function applyAccent(hex){
  if(hex&&/^#[0-9a-fA-F]{6}$/.test(hex))document.documentElement.style.setProperty('--accent',hex);
}

// ── INIT ────────────────────────────────────────────────────────────────────
async function init(){
  const{data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='shoppodium-signup2.html';return}
  uid=session.user.id;
  const token=session.access_token||SUPABASE_KEY;
  bookingUrl=`https://shoppodium.vercel.app/shoppodium-shop.html?id=${uid}`;
  try{
    const res=await fetch(SUPABASE_URL+'/rest/v1/profiles?id=eq.'+uid+'&select=*',{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+token}});
    const rows=await res.json();
    profile=Array.isArray(rows)&&rows.length?rows[0]:{};
  }catch(e){profile={}}
  applyAccent(profile.accent_color);
  try{
    const res=await fetch(SUPABASE_URL+'/rest/v1/jobs?tinter_id=eq.'+uid+'&order=created_at.desc',{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+token}});
    const j=await res.json();
    allJobs=Array.isArray(j)?j:[];
  }catch(e){allJobs=[]}
  computeCareer();
  renderGrid();
}
init();
</script>
</body>
</html>
