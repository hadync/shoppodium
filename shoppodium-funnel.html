<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Onboarding Funnel</title>
<style>body{background:#060606;color:#fafafa;font-family:-apple-system,sans-serif;max-width:640px;margin:0 auto;padding:40px 20px}
h1{font-size:20px;font-weight:800}.sub{color:#5a5a62;font-size:12px;margin-top:4px}
.row{margin-top:14px}.lbl{display:flex;justify-content:space-between;font-size:12px;color:#9aa0ab;margin-bottom:4px}
.bar{height:22px;background:#101014;border-radius:5px;overflow:hidden}.fill{height:100%;background:#2f6bff;border-radius:5px;min-width:2px}
.meta{color:#5a5a62;font-size:11px;margin-top:26px;line-height:1.6}
.seg{display:flex;gap:8px;margin-top:18px}.seg button{background:#101014;border:1px solid #26262c;color:#9aa0ab;padding:6px 12px;border-radius:8px;font-size:12px}
.seg button.on{color:#fff;border-color:#2f6bff}</style></head><body>
<h1>Onboarding funnel</h1><div class="sub" id="sub">loading...</div>
<div class="seg"><button id="bAll" class="on">All time</button><button id="b24">Last 24h</button></div>
<div id="funnel"></div><div class="meta" id="meta"></div>
<script>
var U="https://cajerxgiwbgevfjzkkoy.supabase.co",K="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNhamVyeGdpd2JnZXZmanpra295Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NDY0NDcsImV4cCI6MjA5NjAyMjQ0N30.8dCTpfeWkdUIjmKGgfnrOqlBa1jIwDt_yqg3Dlt1a0M";
var STEPS=[["screen_0","Montage"],["screen_1","Story"],["screen_2","Profile"],["screen_4","Quote form"],["screen_5","Inbox flip"],["screen_6","iMessage"],["screen_7","Booked"],["screen_8","Bridge"],["handoff","To log flow"],["logjob_view","Real log page"],["save_view","Account screen"]];
var rows=[];
function load(){fetch(U+"/rest/v1/onboarding_events?select=sid,step,ms,created_at,mobile&order=created_at.desc&limit=20000",{headers:{apikey:K,Authorization:"Bearer "+K}}).then(function(r){if(!r.ok){document.getElementById("sub").textContent="table not created yet (run the SQL)";throw 0;}return r.json();}).then(function(j){rows=j;render(false);}).catch(function(){});}
function render(h24){var cut=h24?Date.now()-864e5:0;var R=rows.filter(function(x){return !cut||new Date(x.created_at).getTime()>cut;});
var by={};STEPS.forEach(function(p){by[p[0]]={};});var sids={};
R.forEach(function(x){sids[x.sid]=1;if(by[x.step])by[x.step][x.sid]=1;});
function n(o){return Object.keys(o).length;}
var base=n(by.screen_0)||1;
document.getElementById("sub").textContent=n(sids)+" sessions, "+R.length+" events"+(h24?", last 24h":"");
document.getElementById("funnel").innerHTML=STEPS.map(function(p){var c=n(by[p[0]]),pc=Math.round(c/base*100);return '<div class="row"><div class="lbl"><span>'+p[1]+'</span><span>'+c+', '+pc+'%</span></div><div class="bar"><div class="fill" style="width:'+pc+'%"></div></div></div>';}).join("");
var mob=R.filter(function(x){return x.mobile;}).length;
document.getElementById("meta").textContent="mobile events: "+Math.round(mob/(R.length||1)*100)+"%, unique sessions per step, base = montage views";}
document.getElementById("bAll").onclick=function(){seg(this);render(false);};
document.getElementById("b24").onclick=function(){seg(this);render(true);};
function seg(b){document.querySelectorAll(".seg button").forEach(function(x){x.classList.remove("on");});b.classList.add("on");}
load();</script></body></html>
