<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Giveaways · ShopPodium</title>
<meta name="theme-color" content="#060606">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Chakra+Petch:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{ --blue:#18aef0; --green:#22c55e; --gold:#eab308; }
  *{box-sizing:border-box}
  body{background:#060606;color:#fafafa;font-family:'Plus Jakarta Sans',sans-serif;margin:0;padding:24px 20px 70px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:460px;margin:0 auto}
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
  .h1{font-family:'Chakra Petch',sans-serif;font-size:22px;font-weight:700}
  .back{font-size:12.5px;font-weight:600;color:#6b7280;text-decoration:none}
  .card{background:#0b0b0d;border:1px solid #17171b;border-radius:14px;padding:18px 16px;margin-bottom:14px}
  .lbl{font-size:11px;font-weight:600;letter-spacing:.04em;color:#8a8d96;margin:0 0 6px 2px}
  .i{width:100%;background:#101014;border:1px solid #1c1c22;border-radius:10px;color:#fafafa;font-family:'Plus Jakarta Sans',sans-serif;font-size:14.5px;padding:12px 13px;margin-bottom:11px;outline:none}
  textarea.i{resize:vertical;min-height:60px}
  .i:focus{border-color:#2b3947}
  .btn{width:100%;padding:13px;background:#fafafa;color:#0a0a0c;border:none;border-radius:11px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
  .btn:disabled{opacity:.5}
  .sectlbl{font-family:'Plus Jakarta Sans',sans-serif;font-size:10.5px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:#5a5a62;margin:6px 2px 10px}
  .err{font-size:12px;color:#f87171;min-height:15px}
  .g-prize{font-family:'Chakra Petch',sans-serif;font-size:17px;font-weight:700;line-height:1.2}
  .pill{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:20px;margin-left:8px;vertical-align:2px}
  .pill.open{color:var(--green);border:1px solid rgba(34,197,94,.4)}
  .pill.drawn{color:var(--gold);border:1px solid rgba(234,179,8,.4)}
  .pill.closed{color:#6b7280;border:1px solid #2a2a30}
  .count{font-size:12.5px;color:#8a8d96;margin-top:8px}
  .count b{color:#fafafa;font-family:'Barlow Condensed',sans-serif;font-size:16px}
  .row{display:flex;gap:8px;margin-top:12px}
  .sbtn{flex:1;text-align:center;padding:9px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #2b2822;background:#0e0e10;color:#e8e5df}
  .sbtn.solid{background:var(--blue);border-color:var(--blue);color:#04121b}
  .link{font-size:11px;color:#5a5a62;margin-top:10px;word-break:break-all;background:#0e0e10;border:1px solid #17171b;border-radius:7px;padding:8px 10px}
  .entries{margin-top:12px;border-top:1px solid #17171b;padding-top:10px}
  .entry{display:flex;justify-content:space-between;gap:10px;font-size:13px;padding:7px 0;border-bottom:1px solid #121214}
  .entry .nm{color:#e8e5df}
  .entry .ct{color:#8a8d96}
  .winner{margin-top:12px;background:rgba(234,179,8,.08);border:1px solid rgba(234,179,8,.3);border-radius:9px;padding:11px 12px}
  .winner .wl{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gold)}
  .winner .wn{font-family:'Chakra Petch',sans-serif;font-size:16px;font-weight:700;margin-top:3px}
  .empty{text-align:center;color:#5a5a62;font-size:13px;padding:24px 0}
  .hide{display:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="h1">Giveaways</div>
    <a class="back" href="app2.html">&#8249; Dashboard</a>
  </div>

  <div id="gate" class="empty">Loading…</div>

  <div id="app" class="hide">
    <!-- NEW GIVEAWAY -->
    <div class="card">
      <div class="sectlbl">Start a giveaway</div>
      <div class="lbl">What you're giving away</div>
      <input id="nPrize" class="i" type="text" placeholder="Full vehicle tint" maxlength="80">
      <div class="lbl">Headline (optional)</div>
      <input id="nHeadline" class="i" type="text" placeholder="One free full tint, drawn end of the month" maxlength="120">
      <div class="lbl">Rules / details (optional)</div>
      <textarea id="nDetails" class="i" placeholder="Must be local. Winner picked at random. One entry per person."></textarea>
      <div class="lbl">Ends (optional)</div>
      <input id="nEnds" class="i" type="date">
      <button id="createBtn" class="btn" onclick="createGiveaway()">Create giveaway</button>
      <div class="err" id="cErr"></div>
    </div>

    <div class="sectlbl" style="margin-top:22px">Your giveaways</div>
    <div id="list"></div>
  </div>
</div>

<script>
const SUPABASE_URL='https://cajerxgiwbgevfjzkkoy.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNhamVyeGdpd2JnZXZmanpra295Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NDY0NDcsImV4cCI6MjA5NjAyMjQ0N30.8dCTpfeWkdUIjmKGgfnrOqlBa1jIwDt_yqg3Dlt1a0M';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
const $ = id => document.getElementById(id);
const esc = s => (s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let uid = null;

async function boot(){
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){ location.href = 'shoppodium-start.html'; return; }
  uid = session.user.id;
  $('gate').classList.add('hide');
  $('app').classList.remove('hide');
  loadGiveaways();
}

function genCode(){
  let c=''; const a='abcdefghijklmnopqrstuvwxyz0123456789';
  for(let i=0;i<6;i++) c += a[Math.floor(Math.random()*a.length)];
  return c;
}

async function createGiveaway(){
  const prize = $('nPrize').value.trim();
  $('cErr').textContent='';
  if(prize.length < 2){ $('cErr').textContent='Say what you are giving away.'; return; }
  const headline = $('nHeadline').value.trim() || null;
  const details = $('nDetails').value.trim() || null;
  const endsVal = $('nEnds').value;
  const ends_at = endsVal ? new Date(endsVal + 'T23:59:59').toISOString() : null;
  const btn = $('createBtn'); btn.disabled=true; btn.textContent='Creating…';
  let done=false;
  for(let attempt=0; attempt<4 && !done; attempt++){
    const code = genCode();
    const { error } = await sb.from('giveaways').insert({ shop_id:uid, code, prize, headline, details, ends_at });
    if(!error){ done=true; }
    else if(!(error.code==='23505' || /duplicate/i.test(error.message||''))){ $('cErr').textContent = 'Could not create it. Try again.'; break; }
  }
  btn.disabled=false; btn.textContent='Create giveaway';
  if(done){
    $('nPrize').value=''; $('nHeadline').value=''; $('nDetails').value=''; $('nEnds').value='';
    loadGiveaways();
  }
}

async function loadGiveaways(){
  const { data: gvs, error } = await sb.from('giveaways').select('*').eq('shop_id',uid).order('created_at',{ascending:false});
  const list = $('list');
  if(error){ list.innerHTML = '<div class="empty">Could not load. Refresh.</div>'; return; }
  if(!gvs || !gvs.length){ list.innerHTML = '<div class="empty">No giveaways yet. Start one above.</div>'; return; }

  // entry counts
  const counts = {};
  await Promise.all(gvs.map(async g => {
    const { count } = await sb.from('giveaway_entries').select('id',{count:'exact',head:true}).eq('giveaway_id', g.id);
    counts[g.id] = count || 0;
  }));

  list.innerHTML = gvs.map(g => {
    const url = 'https://shoppodium.vercel.app/shoppodium-giveaway.html?g=' + g.code;
    const n = counts[g.id] || 0;
    const canDraw = g.status==='open' && n>0;
    return `<div class="card" id="gv_${g.id}">
      <div class="g-prize">${esc(g.prize)}<span class="pill ${g.status}">${g.status}</span></div>
      ${g.headline ? '<div class="count" style="color:#c9c5be">'+esc(g.headline)+'</div>' : ''}
      <div class="count"><b>${n}</b> ${n===1?'entry':'entries'}</div>
      <div class="link">${esc(url)}</div>
      <div class="row">
        <div class="sbtn" onclick="copyLink('${g.code}', this)">Copy link</div>
        <div class="sbtn" onclick="viewEntries('${g.id}')">See entries</div>
        <div class="sbtn ${canDraw?'solid':''}" style="${canDraw?'':'opacity:.4;pointer-events:none'}" onclick="draw('${g.id}')">Draw winner</div>
      </div>
      <div class="entries hide" id="ent_${g.id}"></div>
      <div id="win_${g.id}"></div>
    </div>`;
  }).join('');
}

function copyLink(code, el){
  const url = 'https://shoppodium.vercel.app/shoppodium-giveaway.html?g=' + code;
  navigator.clipboard.writeText(url).then(()=>{ const t=el.textContent; el.textContent='Copied'; setTimeout(()=>el.textContent=t,1400); })
    .catch(()=>{ prompt('Copy this link:', url); });
}

async function viewEntries(id){
  const box = $('ent_'+id);
  if(!box.classList.contains('hide')){ box.classList.add('hide'); return; }
  box.classList.remove('hide');
  box.innerHTML = '<div class="empty" style="padding:12px 0">Loading…</div>';
  const { data: entries } = await sb.from('giveaway_entries').select('*').eq('giveaway_id',id).order('created_at',{ascending:false});
  if(!entries || !entries.length){ box.innerHTML = '<div class="empty" style="padding:12px 0">No entries yet.</div>'; return; }
  box.innerHTML = entries.map(e => `<div class="entry"><span class="nm">${esc(e.name)}</span><span class="ct">${esc(e.contact)}</span></div>`).join('');
}

async function draw(id){
  const { data: entries } = await sb.from('giveaway_entries').select('*').eq('giveaway_id',id);
  if(!entries || !entries.length){ alert('No entries to draw from yet.'); return; }
  if(!confirm('Draw a random winner now? This closes the giveaway.')) return;
  const w = entries[Math.floor(Math.random()*entries.length)];
  const { error } = await sb.from('giveaways').update({ winner_entry_id:w.id, status:'drawn' }).eq('id',id);
  if(error){ alert('Could not save the draw. Try again.'); return; }
  $('win_'+id).innerHTML = `<div class="winner"><div class="wl">Winner</div><div class="wn">${esc(w.name)}</div><div class="ct" style="font-size:13px;color:#8a8d96;margin-top:2px">${esc(w.contact)}</div></div>`;
  loadGiveaways();
}

boot();
</script>
</body>
</html>
