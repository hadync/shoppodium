<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Engine — ShopPodium</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--blue:#18aef0;--green:#22c55e;--black:#000;--surface:#060606;--card:#0a0a0a;--border:#1a1a1a;--text:#fff;--sub:#555;--dim:#252525;--muted:#333}
html,body{background:var(--black);color:var(--text);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}
nav{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(0,0,0,.95);backdrop-filter:blur(20px);z-index:100}
.nav-brand{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;text-decoration:none;color:var(--text)}
.nav-brand span{color:var(--blue)}
.nav-back{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--sub);text-decoration:none}
.page{max-width:480px;margin:0 auto;padding-bottom:80px}

/* HERO SCORE */
.score-hero{padding:32px 18px 28px;border-bottom:1px solid var(--border)}
.score-eyebrow{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--sub);margin-bottom:14px}
.score-value{font-family:'Barlow Condensed',sans-serif;font-size:96px;font-weight:900;line-height:1;letter-spacing:-.02em;color:var(--text);margin-bottom:6px}
.score-value span{color:var(--blue)}
.score-track{height:1px;background:var(--border);margin:16px 0 12px;position:relative}
.score-fill{position:absolute;top:0;left:0;height:100%;background:var(--blue);transition:width .9s cubic-bezier(.4,0,.2,1)}
.score-note{font-size:11px;color:var(--sub);line-height:1.5}

/* INSIGHT CARD */
.insight-card{padding:22px 18px;border-bottom:1px solid var(--border)}
.insight-label{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--sub);margin-bottom:10px}
.insight-text{font-size:14px;color:rgba(255,255,255,.75);line-height:1.6;min-height:44px;transition:opacity .4s}

/* AUDIT */
.audit{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.audit-col{background:var(--black);padding:20px 16px}
.audit-col-label{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px}
.audit-col-label.strong{color:var(--green)}
.audit-col-label.growth{color:var(--sub)}
.audit-item{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.audit-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.audit-dot.strong{background:var(--green)}
.audit-dot.growth{background:var(--muted)}
.audit-item-text{font-size:12px;line-height:1.3}
.audit-item-text.strong{color:rgba(255,255,255,.8)}
.audit-item-text.growth{color:var(--sub)}

/* METRICS GRID */
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.metric-cell{background:var(--black);padding:20px 16px}
.metric-num{font-family:'Barlow Condensed',sans-serif;font-size:44px;font-weight:900;line-height:1;margin-bottom:4px}
.metric-label{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--sub)}
.metric-sub{font-size:10px;color:var(--muted);margin-top:2px}
.metric-status{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.metric-status.active{color:var(--green)}
.metric-status.inactive{color:var(--muted)}

/* OPPORTUNITIES */
.opp-section{border-bottom:1px solid var(--border)}
.opp-head{padding:18px 18px 12px}
.opp-eyebrow{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--sub)}
.opp-item{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-top:1px solid var(--border)}
.opp-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:.04em;color:var(--text)}
.opp-desc{font-size:10px;color:var(--sub);margin-top:2px}
.opp-badge{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;flex-shrink:0}
.opp-badge.active{color:var(--green);border:1px solid rgba(34,197,94,.3)}
.opp-badge.inactive{color:var(--muted);border:1px solid var(--dim)}
.opp-badge.opportunity{color:var(--blue);border:1px solid rgba(24,174,240,.3)}

/* FUTURE YOU */
.future{border-bottom:1px solid var(--border)}
.future-head{padding:18px 18px 14px;border-bottom:1px solid var(--border)}
.future-eyebrow{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--sub)}
.future-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border)}
.future-col{background:var(--black);padding:20px 16px}
.future-col-label{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:16px;color:var(--sub)}
.future-col-label.current{color:var(--sub)}
.future-col-label.potential{color:var(--blue)}
.future-score{font-family:'Barlow Condensed',sans-serif;font-size:44px;font-weight:900;line-height:1;margin-bottom:12px}
.future-score.current{color:var(--text)}
.future-score.potential{color:var(--blue)}
.future-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.future-marker{font-size:10px;margin-top:1px;flex-shrink:0}
.future-marker.on{color:var(--green)}
.future-marker.off{color:var(--dim)}
.future-text{font-size:11px;line-height:1.4}
.future-text.on{color:rgba(255,255,255,.7)}
.future-text.off{color:var(--muted)}
.future-disclaimer{padding:12px 18px;font-size:10px;color:var(--muted);line-height:1.5}

/* PROFILE ACTIONS */
.profile-actions{padding:18px}
.action-row{display:flex;gap:8px}
.action-btn{flex:1;padding:13px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;transition:all .15s}
.action-btn.primary{background:var(--blue);color:#000;border:none}
.action-btn.ghost{background:none;border:1px solid var(--border);color:var(--sub)}
.action-btn.ghost:hover{border-color:var(--blue);color:var(--text)}

.loading{display:flex;align-items:center;justify-content:center;min-height:60vh;font-size:12px;color:var(--sub);letter-spacing:.08em;text-transform:uppercase}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-brand">Shop<span>Podium</span></a>
  <a href="app2.html" class="nav-back">← Dashboard</a>
</nav>

<div class="page" id="mainPage">
  <div class="loading" id="loadingState">Analyzing profile...</div>
</div>

<script>
const SUPABASE_URL='https://cajerxgiwbgevfjzkkoy.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNhamVyeGdpd2JnZXZmanpra295Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NDY0NDcsImV4cCI6MjA5NjAyMjQ0N30.8dCTpfeWkdUIjmKGgfnrOqlBa1jIwDt_yqg3Dlt1a0M';
const{createClient}=supabase;
const sb=createClient(SUPABASE_URL,SUPABASE_KEY);

function hexToRgb(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return{r,g,b}}
function darken(h,f){const{r,g,b}=hexToRgb(h);const d=v=>Math.max(0,Math.round(v*(1-f)));return'#'+[d(r),d(g),d(b)].map(v=>v.toString(16).padStart(2,'0')).join('')}
function applyAccent(hex){
  if(!hex||!/^#[0-9a-fA-F]{6}$/.test(hex))return;
  document.documentElement.style.setProperty('--blue',hex);
}

// ─── SCORE ENGINE ─────────────────────────────────────────────────────────
function calcScore(p, jobs) {
  let s = 20; // base — never 0
  if (p.shop_name) s += 5;
  if (p.profile_photo) s += 8;
  if (p.bio && p.bio.length > 20) s += 7;
  if (p.city) s += 3;
  if (p.phone) s += 4;
  if (p.google_review_url) s += 5;
  if (p.years_in_business) s += 3;
  const n = jobs.length;
  if (n >= 1) s += 5;
  if (n >= 5) s += 4;
  if (n >= 10) s += 4;
  if (n >= 25) s += 4;
  if (n >= 50) s += 4;
  const v = jobs.filter(j=>j.verified).length;
  if (v >= 1) s += 5;
  if (v >= 5) s += 4;
  if (v >= 10) s += 3;
  const wp = jobs.filter(j=>j.photos&&j.photos.length>0).length;
  if (wp >= 1) s += 5;
  if (wp >= 5) s += 3;
  if (n > 0) {
    const days = (Date.now() - new Date(jobs[0].created_at)) / 86400000;
    if (days < 14) s += 5;
    else if (days < 30) s += 3;
  }
  return Math.min(100, s);
}

// ─── AUDIT ENGINE ─────────────────────────────────────────────────────────
function buildAudit(p, jobs, score) {
  const strong = [], growth = [];
  const v = jobs.filter(j=>j.verified).length;
  const wp = jobs.filter(j=>j.photos&&j.photos.length>0).length;

  // Strong areas
  if (jobs.length >= 10) strong.push('Career history');
  else if (jobs.length >= 1) strong.push('Active installer');
  if (v >= 1) strong.push('Verified work');
  if (wp >= 1) strong.push('Portfolio photos');
  if (p.shop_name) strong.push('Shop identity');
  if (p.profile_photo) strong.push('Profile photo');
  if (p.google_review_url) strong.push('External reviews');
  if (jobs.length > 0) {
    const days = (Date.now() - new Date(jobs[0].created_at)) / 86400000;
    if (days < 14) strong.push('Recent activity');
  }

  // Growth opportunities (only real gaps)
  if (!p.bio || p.bio.length < 20) growth.push('Shop description');
  if (!p.profile_photo) growth.push('Profile photo');
  if (!p.phone) growth.push('Contact info');
  if (v === 0 && jobs.length > 0) growth.push('Verified installs');
  if (wp === 0 && jobs.length > 0) growth.push('Job photos');
  if (!p.google_review_url) growth.push('Google reviews');
  if (!p.years_in_business) growth.push('Business history');
  if (jobs.length < 5) growth.push('Install volume');

  return { strong: strong.slice(0,4), growth: growth.slice(0,4) };
}

// ─── INSIGHT ENGINE ───────────────────────────────────────────────────────
function buildInsights(p, jobs, score) {
  const v = jobs.filter(j=>j.verified).length;
  const vRate = jobs.length > 0 ? Math.round((v/jobs.length)*100) : 0;
  const wp = jobs.filter(j=>j.photos&&j.photos.length>0).length;
  const days = jobs.length > 0 ? (Date.now()-new Date(jobs[0].created_at))/86400000 : 999;
  const views = p.profile_views || 0;

  const pool = [];

  if (views > 100) pool.push(`Your profile has received ${views.toLocaleString()} views. Visibility is building.`);
  else if (views > 0) pool.push(`${views} profile views tracked. Every install logged increases discoverability.`);

  if (score >= 70) pool.push('Your profile is in a strong position. Verified installs and featured work will take it further.');
  else if (score >= 50) pool.push('Profile is developing. Adding photos to recent jobs would measurably improve profile strength.');
  else pool.push('Profile is active but has significant room to grow. Start with a shop description and job photos.');

  if (v > 0 && vRate >= 80) pool.push(`${vRate}% of your installs are customer-verified. This is a strong credibility signal.`);
  else if (jobs.length > 0 && v === 0) pool.push('No installs have been verified yet. Verified work is the strongest trust signal on your public profile.');
  else if (v > 0) pool.push(`${vRate}% verification rate. Increasing this strengthens customer confidence significantly.`);

  if (days < 7) pool.push('Profile activity is current. Recent installs signal to customers that the shop is active.');
  else if (days > 30 && jobs.length > 0) pool.push(`${Math.floor(days)} days since last install. Active profiles generate more inbound interest.`);

  if (!p.bio || p.bio.length < 20) pool.push('A shop description is one of the highest-impact improvements available. Customers read it before booking.');

  if (wp === 0 && jobs.length > 0) pool.push('No job photos are attached to your installs. Photo documentation is the strongest portfolio signal.');
  else if (wp > 0) pool.push(`${wp} jobs have photos. Visual documentation builds trust before a customer ever makes contact.`);

  if (!p.google_review_url) pool.push('Connecting your Google reviews adds external credibility that cannot be self-reported.');

  if (pool.length === 0) pool.push('Your profile is live and visible to potential customers.');

  return pool;
}

// ─── OPPORTUNITIES ENGINE ─────────────────────────────────────────────────
function buildOpportunities(p, jobs) {
  const v = jobs.filter(j=>j.verified).length;
  return [
    {name:'Customer Reviews', desc:'External verification from real customers', status: p.google_review_url ? 'active' : 'opportunity'},
    {name:'Booking Requests', desc:'Inbound quote and appointment requests', status: p.phone ? 'active' : 'inactive'},
    {name:'Verified Installs', desc:'Customer-confirmed job verification', status: v > 0 ? 'active' : 'inactive'},
    {name:'Portfolio Photos', desc:'Visual documentation of completed work', status: jobs.filter(j=>j.photos&&j.photos.length).length > 0 ? 'active' : 'inactive'},
    {name:'Profile Bio', desc:'Shop description shown on public profile', status: p.bio && p.bio.length > 20 ? 'active' : 'opportunity'},
    {name:'Lead Capture', desc:'Direct customer enquiry through profile', status: p.phone ? 'active' : 'inactive'},
  ];
}

// ─── FUTURE YOU ───────────────────────────────────────────────────────────
function buildFutureYou(p, jobs, currentScore) {
  const v = jobs.filter(j=>j.verified).length;
  const wp = jobs.filter(j=>j.photos&&j.photos.length).length;
  const current = [
    {label:'Profile Potential', value: currentScore+'%', on:true},
    {label:'Shop Description', on: !!(p.bio&&p.bio.length>20)},
    {label:'Job Photos', on: wp>0},
    {label:'Verified Installs', on: v>0},
    {label:'Google Reviews', on: !!p.google_review_url},
    {label:'Booking Active', on: !!p.phone},
  ];
  const future = [
    {label:'Profile Potential', value:'92%', on:true},
    {label:'Shop Description', on:true},
    {label:'Job Photos', on:true},
    {label:'Verified Installs', on:true},
    {label:'Google Reviews', on:true},
    {label:'Booking Active', on:true},
  ];
  return {current, future};
}

// ─── RENDER ───────────────────────────────────────────────────────────────
function render(p, jobs) {
  const score = calcScore(p, jobs);
  const audit = buildAudit(p, jobs, score);
  const insights = buildInsights(p, jobs, score);
  const opps = buildOpportunities(p, jobs);
  const {current, future} = buildFutureYou(p, jobs, score);
  const views = p.profile_views || null;
  const v = jobs.filter(j=>j.verified).length;

  const page = document.getElementById('mainPage');
  page.innerHTML = `
  <!-- PROFILE POTENTIAL SCORE -->
  <div class="score-hero">
    <div class="score-eyebrow">Profile Potential</div>
    <div class="score-value"><span>${score}</span>%</div>
    <div class="score-track"><div class="score-fill" id="scoreFill" style="width:0%"></div></div>
    <div class="score-note">${p.shop_name||'Your profile'} · ${jobs.length} install${jobs.length===1?'':'s'} logged${v>0?' · '+v+' verified':''}</div>
  </div>

  <!-- INSIGHT -->
  <div class="insight-card">
    <div class="insight-label">Insight</div>
    <div class="insight-text" id="insightText">${insights[0]||''}</div>
  </div>

  <!-- CAREER SNAPSHOT -->
  <div class="metrics">
    <div class="metric-cell">
      <div class="metric-num">${jobs.length}</div>
      <div class="metric-label">Career Installs</div>
    </div>
    <div class="metric-cell">
      <div class="metric-num">${v}</div>
      <div class="metric-label">Verified Installs</div>
    </div>
    <div class="metric-cell">
      ${views !== null
        ? `<div class="metric-num">${views.toLocaleString()}</div><div class="metric-label">Profile Views</div>`
        : `<div class="metric-num">—</div><div class="metric-label">Profile Views</div><div class="metric-sub">Add profile_views column to track</div>`}
    </div>
    <div class="metric-cell">
      <div class="metric-label">Booking</div>
      <div class="metric-status ${p.phone?'active':'inactive'}" style="margin-top:8px;font-size:20px">${p.phone?'Active':'Inactive'}</div>
    </div>
  </div>

  <!-- PROFILE AUDIT -->
  <div class="audit">
    <div class="audit-col">
      <div class="audit-col-label strong">Strong Areas</div>
      ${audit.strong.length > 0
        ? audit.strong.map(s=>`<div class="audit-item"><div class="audit-dot strong"></div><div class="audit-item-text strong">${s}</div></div>`).join('')
        : '<div class="audit-item-text growth">Log your first install to begin building your record.</div>'}
    </div>
    <div class="audit-col">
      <div class="audit-col-label growth">Growth Opportunities</div>
      ${audit.growth.length > 0
        ? audit.growth.map(g=>`<div class="audit-item"><div class="audit-dot growth"></div><div class="audit-item-text growth">${g}</div></div>`).join('')
        : '<div class="audit-item-text strong">No major gaps identified.</div>'}
    </div>
  </div>

  <!-- OPPORTUNITIES -->
  <div class="opp-section">
    <div class="opp-head"><div class="opp-eyebrow">Opportunities</div></div>
    ${opps.map(o=>`
    <div class="opp-item">
      <div><div class="opp-name">${o.name}</div><div class="opp-desc">${o.desc}</div></div>
      <div class="opp-badge ${o.status}">${o.status==='active'?'Active':o.status==='opportunity'?'Opportunity Available':'Inactive'}</div>
    </div>`).join('')}
  </div>

  <!-- FUTURE YOU -->
  <div class="future">
    <div class="future-head"><div class="future-eyebrow">Future Profile</div></div>
    <div class="future-grid">
      <div class="future-col">
        <div class="future-col-label current">Current</div>
        <div class="future-score current">${score}%</div>
        ${current.slice(1).map(i=>`<div class="future-item"><span class="future-marker ${i.on?'on':'off'}">${i.on?'✓':'○'}</span><span class="future-text ${i.on?'on':'off'}">${i.label}</span></div>`).join('')}
      </div>
      <div class="future-col">
        <div class="future-col-label potential">Potential</div>
        <div class="future-score potential">92%</div>
        ${future.slice(1).map(i=>`<div class="future-item"><span class="future-marker on">✓</span><span class="future-text on">${i.label}</span></div>`).join('')}
      </div>
    </div>
    <div class="future-disclaimer">Example profile shown for illustration purposes.</div>
  </div>

  <!-- ACTIONS -->
  <div class="profile-actions">
    <div class="action-row">
      <a href="app2.html#editProfile" class="action-btn primary" onclick="document.getElementById && window.location.href='app2.html'">Edit Profile</a>
      <a href="shoppodium-logjob.html" class="action-btn ghost">Log a Job</a>
    </div>
  </div>
  `;

  // Animate score bar
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const fill = document.getElementById('scoreFill');
    if(fill) fill.style.width = score + '%';
  }));

  // Rotate insights
  let idx = 0;
  setInterval(()=>{
    idx = (idx+1) % insights.length;
    const el = document.getElementById('insightText');
    if(!el) return;
    el.style.opacity='0';
    setTimeout(()=>{el.textContent=insights[idx];el.style.opacity='1';},400);
  }, 6000);
}

// ─── INIT ─────────────────────────────────────────────────────────────────
async function init() {
  const{data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='shoppodium-signup.html';return;}
  const uid=session.user.id;
  const{data:p}=await sb.from('profiles').select('*').eq('id',uid).single();
  const profile=p||{};
  if(profile.accent_color)applyAccent(profile.accent_color);
  const{data:jobs}=await sb.from('jobs').select('*').eq('tinter_id',uid).order('created_at',{ascending:false});
  const allJobs=jobs||[];
  document.getElementById('loadingState')?.remove();
  render(profile,allJobs);
}
init();
</script>
</body>
</html>
