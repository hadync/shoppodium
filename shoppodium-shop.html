<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Career record · ShopPodium</title>
<meta name="description" content="Real installs, real photos, on the record. See the shop's career record and get yours done.">
<meta property="og:title" content="Career record · ShopPodium">
<meta property="og:description" content="Real installs, real photos, on the record.">
<meta property="og:image" content="https://shoppodium.vercel.app/og-shop.png">
<link rel="icon" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Chakra+Petch:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --sp-bg:#060606; --sp-ink:#faf8f4; --sp-dim:#5a5a62; --sp-live:#22c55e;
  --accent:#4b8bc7;
  --jakarta:"Plus Jakarta Sans",-apple-system,"Segoe UI",sans-serif;
  --chakra:"Chakra Petch",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:var(--sp-bg)}
body{background:var(--sp-bg);font-family:var(--jakarta);color:var(--sp-ink);min-height:100vh}
.trim{height:3px;background:var(--accent)}
.page{max-width:430px;margin:0 auto;padding-bottom:110px}

/* header strip */
.striprow{display:flex;align-items:center;padding:calc(env(safe-area-inset-top) + 18px) 18px 0;text-align:left}
.pname{font-family:var(--chakra);font-size:18px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;color:#faf8f4;line-height:1.15}
.pmeta{color:#6b665f;font-size:8.5px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;margin-top:4px}

/* monument */
.plive{display:flex;justify-content:center;align-items:center;gap:6px;margin-top:32px;color:var(--sp-live);font-size:11px;font-weight:500}
.pdot{width:6px;height:6px;border-radius:50%;background:var(--sp-live);animation:pd 1.8s infinite}
@keyframes pd{0%,100%{opacity:1}50%{opacity:.35}}
.pnum{text-align:center;font-family:var(--chakra);font-weight:700;font-size:72px;line-height:.92;margin-top:8px;color:#faf8f4;letter-spacing:0}
.pnum.small{font-size:54px}
.pcap{text-align:center;font-size:9.5px;font-weight:500;letter-spacing:.24em;color:#6b665f;text-transform:uppercase;margin-top:7px}
.pprior{text-align:center;font-size:11px;color:#524e48;margin-top:8px;display:none}
.pprior b{color:#8f8a82;font-weight:600}
.pprior .tag{color:#3a362f}
.seeall{text-align:center;font-size:11px;color:#8a8f98;margin-top:9px;font-weight:500;cursor:pointer;display:none}
.seeall i{font-style:normal;color:#524e48;margin-left:3px}

.pstrip{display:flex;margin:26px 18px 0}
.pstrip .cell{flex:1;text-align:center}
.pstrip .cell + .cell{border-left:1px solid #1c1a17}
.pstrip .cn{font-family:var(--chakra);font-weight:700;font-size:21px;line-height:1;color:#faf8f4}
.pstrip .cl{font-size:9px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:#6b665f;margin-top:4px}

.icta{margin:24px 18px 0}
.icta-btn{background:var(--sp-ink);color:#08080a;border:none;width:100%;text-align:center;font-family:var(--jakarta);font-weight:600;font-size:15px;padding:14px;border-radius:8px;letter-spacing:.01em;cursor:pointer}
.icta-btn:active{background:var(--accent);color:#fff}

/* service pills */
.svcline{display:flex;gap:8px;overflow-x:auto;padding:12px 18px 0;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.svcline::-webkit-scrollbar{display:none}
.svc{flex:0 0 auto;white-space:nowrap;font-family:var(--jakarta);font-size:12.5px;font-weight:500;color:#e8e5df;background:none;border:1px solid #2b2822;border-radius:7px;padding:8px 13px;display:inline-flex;align-items:baseline;gap:6px;cursor:pointer}
.svc b{font-family:var(--chakra);font-weight:700;font-size:12px;color:#faf8f4}
.svc:active{opacity:.75}

/* experience */
.sect{margin:18px 18px 0;text-align:left}
.sh{font-size:10px;font-weight:500;letter-spacing:.16em;color:var(--sp-dim);text-transform:uppercase;margin-bottom:4px}
.brand{display:flex;align-items:baseline;justify-content:space-between;padding:11px 0;cursor:pointer}
.brand .b{font-size:14.5px;font-weight:600}
.brand .n{font-family:var(--chakra);font-size:14px;font-weight:700;color:#faf8f4}
.brand .n small{font-size:10.5px;color:var(--sp-dim);font-weight:400;margin-left:4px;font-family:var(--jakarta)}
.brand .go{font-style:normal;color:#3a362f;font-size:15px;margin-left:9px;font-weight:400}
.xsearch{display:flex;align-items:center;gap:9px;margin-top:8px;border:1px solid #2b2822;border-radius:7px;padding:10px 12px}
.xsearch input{flex:1;background:none;border:none;outline:none;color:#faf8f4;font-family:var(--jakarta);font-size:13px;font-weight:500;min-width:0}
.xsearch input::placeholder{color:#524e48}

/* recent work */
.worksec{margin-top:22px}
.wsh{font-size:10px;font-weight:500;letter-spacing:.16em;color:var(--sp-dim);text-transform:uppercase;margin:0 18px 10px;text-align:left}
.wtrack{display:flex;gap:10px;overflow-x:auto;padding:0 18px 4px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.wtrack::-webkit-scrollbar{display:none}
.wcard{flex:0 0 70%;scroll-snap-align:start;border-radius:12px;overflow:hidden;background:#0d0c0a;text-align:left;text-decoration:none;color:inherit;display:block}
.wimg{aspect-ratio:4/5;background:linear-gradient(160deg,#15130f,#0b0a08);overflow:hidden;position:relative}
.wimg img{width:100%;height:100%;object-fit:cover;display:block}
.wage{position:absolute;top:8px;left:8px;z-index:2;font-family:var(--jakarta);font-size:10px;font-weight:600;letter-spacing:.04em;color:var(--sp-live);background:rgba(6,6,6,.82);border-radius:4px;padding:3px 7px}
.wage.old{color:#8f8a82}
.wmeta{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:11px 12px 13px}
.wmeta .l{min-width:0}
.wmeta .l b{display:block;font-size:13px;font-weight:600;line-height:1.3;color:#faf8f4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wmeta .l span{display:block;font-size:10px;color:#6b665f;margin-top:2px}
.wmeta .r{text-align:right;flex-shrink:0}
.wmeta .r b{display:block;font-family:var(--chakra);font-size:12.5px;font-weight:700;color:#faf8f4}
.wmeta .r span{display:block;font-size:9px;color:#524e48;margin-top:2px;text-transform:uppercase;letter-spacing:.06em}

.psince{font-size:11.5px;color:#524e48;margin:28px 18px 0;text-align:center}
.footer{text-align:center;margin:34px 0 0;color:#2e2c28;font-family:var(--chakra);font-weight:700;font-size:11px;letter-spacing:.3em;text-transform:uppercase}
.hidden{display:none!important}

/* ═══ STICKY CTA ═══ */
.sticky-cta{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:50;padding:14px 20px calc(16px + env(safe-area-inset-bottom));
  background:linear-gradient(180deg,rgba(5,5,6,0),rgba(5,5,6,.86) 30%,var(--bg));backdrop-filter:blur(8px)}
.sticky-btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:17px;border:none;border-radius:14px;
  background:linear-gradient(180deg,#ffffff,#e9eaee);color:#08080a;font-size:15.5px;font-weight:800;letter-spacing:-.01em;
  box-shadow:0 10px 30px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.1);cursor:pointer;font-family:inherit}
.cta-arrow{font-size:19px;font-weight:400;opacity:.55}

/* ═══ PANEL ═══ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);opacity:0;pointer-events:none;transition:opacity .25s;z-index:80}
.overlay.open{opacity:1;pointer-events:auto}
.panel{position:fixed;left:50%;transform:translate(-50%,105%);bottom:0;width:100%;max-width:430px;background:#0c0c0e;border:1px solid #1a1c22;border-bottom:none;
  border-radius:22px 22px 0 0;z-index:90;transition:transform .32s cubic-bezier(.22,1,.36,1);max-height:88vh;display:flex;flex-direction:column}
.panel.open{transform:translate(-50%,0)}
.p-handle{width:40px;height:4px;background:#26282f;border-radius:99px;margin:12px auto 4px;cursor:pointer;flex-shrink:0}
.p-head{padding:10px 22px 14px;border-bottom:1px solid #131419;flex-shrink:0}
.p-title{font-size:18px;font-weight:800;letter-spacing:-.01em}
.p-sub{font-size:12px;color:#6b6e78;margin-top:3px}
.p-body{padding:18px 22px calc(26px + env(safe-area-inset-bottom));overflow-y:auto}
.fg{margin-bottom:14px}
.fl{display:block;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#585b66;margin-bottom:7px}
.fi,.fs{width:100%;background:#0f1013;border:1px solid #1e2026;border-radius:10px;color:#fff;font-family:inherit;font-size:14px;padding:12px 13px;outline:none}
.fi:focus,.fs:focus{border-color:rgba(var(--blue-rgb),.5)}
.frow{display:flex;gap:10px}
.frow .fg{flex:1}
.f-svc-note{font-size:11px;color:var(--blue);margin-bottom:6px}
.f-submit{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;border:none;border-radius:12px;background:var(--blue);color:#000;
  font-size:14.5px;font-weight:800;font-family:inherit;cursor:pointer;margin-top:4px}
.f-submit:disabled{opacity:.6}
.f-note{text-align:center;font-size:10.5px;color:#3f414a;margin-top:10px}
.f-ok{display:none;text-align:center;padding:26px 0 18px}
.f-ok-head{font-size:19px;font-weight:800}
.f-ok-sub{font-size:12.5px;color:#8a8d96;margin-top:8px}

</style>
</head>
<body>
<div class="trim"></div>
<div class="page">

  <div class="striprow">
    <div>
      <div class="pname" id="hName">Loading...</div>
      <div class="pmeta" id="hLoc"></div>
    </div>
  </div>

  <div class="plive" id="pulse" style="display:none"><span class="pdot"></span><span id="pulseTxt"></span></div>
  <div class="pnum" id="recNum">&nbsp;</div>
  <div class="pcap" id="recLbl">Career installs</div>
  <div class="pprior" id="recPrior"></div>
  <div class="seeall" id="seeAll">See every install on the record <i>&#8250;</i></div>

  <div class="pstrip" id="statStrip" style="display:none">
    <div class="cell"><div class="cn" id="stMonth">0</div><div class="cl">This month</div></div>
    <div class="cell"><div class="cn" id="stYear">0</div><div class="cl">This year</div></div>
    <div class="cell"><div class="cn" id="stOpen">&#8211;</div><div class="cl">Open since</div></div>
  </div>

  <div class="icta"><button class="icta-btn" onclick="openPanel()">Get yours done</button></div>

  <div class="svcline" id="svcLine" style="display:none"></div>

  <div class="sect" id="expSect" style="display:none">
    <div class="sh">Most experienced with</div>
    <div id="makeRows"></div>
    <div class="xsearch">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#524e48" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="mkq" type="text" placeholder="Type your brand, like Toyota" autocomplete="off">
    </div>
  </div>

  <div class="worksec" id="workSec" style="display:none">
    <div class="wsh">Recent work</div>
    <div class="wtrack" id="wTrack"></div>
  </div>

  <div class="psince" id="monLine" style="display:none">Every install since day one is on the page</div>
  <div class="footer">ShopPodium</div>
</div>

<div class="sticky-cta" id="stickyCta" style="display:none">
  <button class="sticky-btn" onclick="openPanel()">
    <span id="stickyLabel">Get yours done</span>
    <span class="cta-arrow">→</span>
  </button>
</div>

<!-- BOOKING OVERLAY & PANEL -->
<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="p-handle" onclick="closePanel()"></div>
  <div class="p-head">
    <div class="p-title" id="panelTitle">Get yours done</div>
    <div class="p-sub" id="panelSub"></div>
  </div>
  <div class="p-body">
    <div id="bookingForm">
      <div class="fg"><label class="fl">Your Name</label><input class="fi" id="bName" placeholder="First and last name" autocomplete="name"></div>
      <div class="fg"><label class="fl">Phone Number</label><input class="fi" id="bPhone" type="tel" placeholder="(555) 000-0000" autocomplete="tel" inputmode="tel"></div>
      <div class="frow">
        <div class="fg"><label class="fl">Car Make</label><input class="fi" id="bMake" placeholder="Toyota"></div>
        <div class="fg"><label class="fl">Model</label><input class="fi" id="bModel" placeholder="Camry"></div>
      </div>
      <div class="fg">
        <label class="fl">Service</label>
        <div class="f-svc-note" id="fSvcNote" style="display:none"></div>
        <select class="fs" id="bService">
          <option value="">Select a service...</option>
          <optgroup label="Window Film">
            <option>Window Tint</option><option>Ceramic Tint</option>
            <option>Carbon Film</option><option>5% / Limo Tint</option>
            <option>Windshield Tint</option><option>Sunroof Tint</option><option>Tint Removal</option>
          </optgroup>
          <optgroup label="Paint Protection">
            <option>PPF: Partial</option><option>PPF: Full Body</option>
            <option>Hood PPF</option><option>Ceramic Coating</option>
            <option>Paint Correction</option><option>Paint Polish</option>
          </optgroup>
          <optgroup label="Vinyl & Wrap">
            <option>Full Vinyl Wrap</option><option>Color Change Wrap</option>
            <option>Partial Wrap</option><option>Hood Wrap</option>
            <option>Roof Wrap</option><option>Chrome Delete</option>
            <option>Pillar Wrap</option><option>Mirror Wrap</option>
          </optgroup>
          <optgroup label="Lighting">
            <option>Headlight Tint</option><option>Tail Light Tint</option>
            <option>LED Upgrade</option><option>Underglow</option><option>Interior LED</option>
          </optgroup>
          <optgroup label="Electronics & Audio">
            <option>Audio System</option><option>Subwoofer Install</option>
            <option>Remote Start</option><option>Dash Cam</option>
            <option>Backup Camera</option><option>Apple CarPlay</option>
          </optgroup>
          <optgroup label="Custom">
            <option>Detailing</option><option>Blackout Package</option>
            <option>Full Custom Package</option><option>Other / Ask Me</option>
          </optgroup>
        </select>
      </div>
      <div class="fg"><label class="fl">Timing</label><input class="fi" id="bTime" placeholder="ASAP, this week, flexible..."></div>
      <div class="fg">
        <label class="fl">Best Way to Reach You</label>
        <select class="fs" id="bContactPref"><option value="Text">Text me</option><option value="Call">Call me</option></select>
      </div>
      <div class="fg" style="display:flex;align-items:center;gap:10px;padding:4px 0">
        <input type="checkbox" id="bRepeat" style="width:14px;height:14px;accent-color:var(--blue);flex-shrink:0">
        <label for="bRepeat" style="font-size:12px;color:#8a8d96;cursor:pointer">I'm a returning customer</label>
      </div>
      <button class="f-submit" id="bookBtn" onclick="submitBooking()">
        <span>Send Request</span><span style="font-size:18px;font-weight:300">→</span>
      </button>
      <div class="f-note">Typically responds within 24 hours</div>
    </div>
    <div class="f-ok" id="successState">
      <div class="f-ok-head">Request Sent</div>
      <div class="f-ok-sub" id="bookingSub"></div>
    </div>
  </div>
</div>

<script>
const SB_URL='https://cajerxgiwbgevfjzkkoy.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNhamVyeGdpd2JnZXZmanpra295Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NDY0NDcsImV4cCI6MjA5NjAyMjQ0N30.8dCTpfeWkdUIjmKGgfnrOqlBa1jIwDt_yqg3Dlt1a0M';
const sb = supabase.createClient(SB_URL, SB_KEY);
const params = new URLSearchParams(location.search);
const shopId = params.get('id') || params.get('shop');
let profile=null, jobs=[];

function $(id){return document.getElementById(id)}
function set(id,v){const e=$(id); if(e) e.textContent=v}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function pickSvc(el) {
  document.querySelectorAll('.p-svc').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  selectedSvc = el.textContent;
  set('stickyLabel', 'Request a quote · ' + selectedSvc);
  const note = $('fSvcNote');
  if (note) { note.textContent = 'Selected: ' + selectedSvc; note.style.display='block'; }
  const sel = $('bService');
  if (sel) {
    for (const opt of sel.options) {
      if (opt.text === selectedSvc) { sel.value = opt.value || opt.text; break; }
    }
  }
}
function getPhotos(j) {
  if (!j.photos) return [];
  if (Array.isArray(j.photos)) return j.photos;
  try { return JSON.parse(j.photos); } catch(e) { return []; }
}

function ago(d){
  const ms = Date.now() - new Date(d).getTime();
  const h = Math.floor(ms/36e5);
  if (h < 1) return {t:'just now', fresh:true};
  if (h < 24) return {t:h+'h ago', fresh:true};
  const days = Math.floor(h/24);
  if (days <= 7) return {t:days+'d ago', fresh:true};
  if (days < 30) return {t:days+'d ago', fresh:false};
  const m = Math.floor(days/30), rd = days - m*30;
  if (m < 12) return {t:m+'m'+(rd?' '+rd+'d':'')+' ago', fresh:false};
  const y = Math.floor(m/12);
  return {t:y+'y'+(m%12?' '+(m%12)+'m':'')+' ago', fresh:false};
}
function recordUrl(extra){
  let u = 'shoppodium-record.html?id='+encodeURIComponent(shopId);
  if (extra) u += '&'+extra;
  return u;
}
function applyAccent(){
  const a = (profile.accent_color||'').trim();
  if (/^#[0-9a-fA-F]{6}$/.test(a)) document.documentElement.style.setProperty('--accent', a);
}

async function init(){
  if(!shopId){ set('hName','Shop not found'); return; }
  const [{data:pr},{data:js}] = await Promise.all([
    sb.from('profiles').select('*').eq('id',shopId).single(),
    sb.from('jobs').select('*').eq('tinter_id',shopId).order('created_at',{ascending:false})
  ]);
  if(!pr){ set('hName','Shop not found'); return; }
  profile = pr; jobs = js||[];
  applyAccent();
  render();
  if (params.get('quote')==='1') setTimeout(openPanel, 400);
}

function render(){
  const total = jobs.length;
  set('hName', profile.shop_name || profile.full_name || 'Shop');
  const trade = String(profile.trade||'Window tint').split(',')[0].trim();
  const loc = [profile.city, profile.state].filter(Boolean).join(', ');
  set('hLoc', (trade + (loc ? ' \u00b7 ' + loc : '')).toUpperCase());
  document.title = (profile.shop_name||'Shop') + ' \u00b7 ShopPodium';

  if (total > 0){
    const a = ago(jobs[0].created_at);
    $('pulse').style.display='flex';
    set('pulseTxt', a.t==='just now' ? 'Last install just now' : (a.t.endsWith('h ago')||a.t==='just now') ? 'Last install today' : 'Last install '+a.t);
  }

  $('recNum').textContent = total.toLocaleString();
  if (total < 25) $('recNum').classList.add('small');
  set('recLbl', total===1 ? 'Career install' : 'Career installs');

  const prior = parseInt(profile.installs_before,10);
  if (prior > 0){
    $('recPrior').innerHTML = '<b>~'+prior.toLocaleString()+'</b> before ShopPodium <span class="tag">\u00b7 self-estimated</span>';
    $('recPrior').style.display='block';
  }

  if (total > 0){
    const sa = $('seeAll');
    sa.style.display='block';
    sa.textContent='';
    sa.insertAdjacentHTML('beforeend','See every install on the record <i>\u203A</i>');
    sa.onclick = ()=>location.href=recordUrl();
  }

  const now = new Date();
  const mCount = jobs.filter(j=>{const d=new Date(j.created_at);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()}).length;
  const yCount = jobs.filter(j=>new Date(j.created_at).getFullYear()===now.getFullYear()).length;
  const openYr = profile.founded_year || (profile.created_at ? new Date(profile.created_at).getFullYear() : null);
  if (total > 0){
    $('statStrip').style.display='flex';
    set('stMonth', mCount.toLocaleString());
    set('stYear', yCount.toLocaleString());
    set('stOpen', openYr || '\u2013');
  }

  // service pills from logged work
  const svcCounts = {};
  jobs.forEach(j=>{ const s = pickSvc(j); if(s) svcCounts[s]=(svcCounts[s]||0)+1; });
  const svcSorted = Object.entries(svcCounts).sort((a,b)=>b[1]-a[1]);
  if (svcSorted.length){
    $('svcLine').style.display='flex';
    $('svcLine').innerHTML = svcSorted.map(([s,n])=>
      `<span class="svc" data-v="${esc(s)}">${esc(s)} <b>${n.toLocaleString()}</b></span>`
    ).join('');
    $('svcLine').querySelectorAll('.svc').forEach(el=>el.addEventListener('click',()=>location.href=recordUrl('service='+encodeURIComponent(el.dataset.v))));
  }

  // top 3 makes + search
  const mk = {};
  jobs.forEach(j=>{ const m=(j.car_make||'').trim(); if(!m) return; const k=m.toLowerCase(); (mk[k]=mk[k]||{name:m,n:0}).n++; });
  const makes = Object.values(mk).sort((a,b)=>b.n-a.n);
  if (makes.length){
    $('expSect').style.display='block';
    $('makeRows').innerHTML = makes.slice(0,3).map(c=>
      `<div class="brand" data-v="${esc(c.name)}"><span class="b">${esc(c.name)}</span><span class="n">${c.n.toLocaleString()}<small>${c.n===1?'install':'installs'}</small><i class="go">\u203A</i></span></div>`
    ).join('');
    $('makeRows').querySelectorAll('.brand').forEach(el=>el.addEventListener('click',()=>location.href=recordUrl('make='+encodeURIComponent(el.dataset.v))));
    $('mkq').addEventListener('keydown',e=>{
      if(e.key==='Enter' && e.target.value.trim()) location.href=recordUrl('q='+encodeURIComponent(e.target.value.trim()));
    });
  }

  // recent work carousel
  const total0 = total;
  const withSeq = jobs.map((j,i)=>({j, seq: total0-i}));
  const withPhotos = withSeq.filter(x=>getPhotos(x.j).length>0).slice(0,8);
  if (withPhotos.length){
    $('workSec').style.display='block';
    $('wTrack').innerHTML = withPhotos.map(x=>{
      const j=x.j, ph=getPhotos(j)[0];
      const v=[j.car_year,j.car_make,j.car_model].filter(Boolean).join(' ');
      const svc=pickSvc(j)||'';
      const a=ago(j.created_at);
      const dt=new Date(j.created_at).toLocaleDateString('en-US',{month:'short',year:'numeric'});
      return `<a class="wcard" href="shoppodium-install.html?shop=${encodeURIComponent(shopId)}&n=${x.seq}">
        <div class="wimg"><span class="wage${a.fresh?'':' old'}">${a.t}</span><img loading="lazy" src="${esc(ph)}" alt=""></div>
        <div class="wmeta"><div class="l"><b>${esc(v)||'Install'}</b>${svc?`<span>${esc(svc)}</span>`:''}</div>
        <div class="r"><b>N\u00ba ${x.seq.toLocaleString()}</b><span>${dt}</span></div></div></a>`;
    }).join('');
  }

  if (total > 0) $('monLine').style.display='block';
  const sc = $('stickyCta'); if (sc) sc.style.display='block';
}

function openPanel() {
  $('panel').classList.add('open');
  $('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closePanel() {
  $('panel').classList.remove('open');
  $('overlay').classList.remove('open');
  document.body.style.overflow='';
}
async function submitBooking() {
  const name=$('bName').value.trim();
  const phone=$('bPhone').value.trim();
  const service=$('bService').value;
  if(!name||!phone||!service){alert("Need your name, phone, and the service you're after.");return;}
  const btn=$('bookBtn');
  btn.disabled=true;btn.querySelector('span').textContent='Sending...';
  const carMake=$('bMake').value.trim();
  const carModel=$('bModel').value.trim();
  const prefTime=$('bTime').value.trim();
  const contactPref=$('bContactPref').value||'Text';
  const {error}=await sb.from('booking_requests').insert({
    shop_id:shopId,customer_name:name,customer_phone:phone,
    car_make:carMake,car_model:carModel,service,
    preferred_time:prefTime,notes:'Contact: '+contactPref,
    is_repeat_customer:$('bRepeat').checked,status:'new'
  });
  if(!error){
    try{
      const {data:pr}=await sb.from('profiles').select('phone,shop_name,full_name').eq('id',shopId).single();
      if(pr?.phone){
        const car=[carMake,carModel].filter(Boolean).join(' ')||'vehicle';
        const msg=`New quote request!\n\n${name}\n${service}${car?' - '+car:''}\nContact: ${phone} (prefers ${contactPref})${prefTime?'\nTiming: '+prefTime:''}\n\nshoppodium.vercel.app`;
        await sb.functions.invoke('send-sms',{body:{to:pr.phone,message:msg,type:'booking_notification'}});
      }
    }catch(e){console.warn('SMS:',e);}
    $('bookingForm').style.display='none';
    $('successState').style.display='block';
    const n=document.getElementById('hName').textContent||'The shop';
    set('bookingSub',n+' will be in touch soon.');
  } else {
    btn.disabled=false;btn.querySelector('span').textContent='Send Request';
    alert("Didn't go through. Try again.");
  }
}

init();
</script>
