<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title id="pageTitle">ShopPodium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#18aef0;--green:#22c55e;--bg:#060606;--brd:#111;--g:24px}
html,body{background:var(--bg);color:#fff;font-family:'Plus Jakarta Sans',sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
.page{max-width:430px;margin:0 auto;padding-bottom:100px}
/* ── UNIVERSAL RAIL — every section aligns to this ─────────────── */
.ps{padding:0 var(--g)}

/* ── HERO ──────────────────────────────────────────────────────── */
.hero{padding:24px 24px 8px;text-align:center}
.logo-wrap{width:82px;height:82px;border-radius:50%;border:1.5px solid rgba(var(--blue-rgb,24,174,240),.35);box-shadow:0 0 0 5px rgba(var(--blue-rgb,24,174,240),.05);margin:0 auto 22px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#0d0d0f;font-family:'Plus Jakarta Sans',sans-serif;font-size:24px;font-weight:700;color:var(--blue)}
.logo-wrap.has-photo{border:1px solid #16161a;box-shadow:none;background:#0b0b0d}
/* logos must never crop — contain, not cover. A little inset keeps them off the ring. */
.logo-wrap img{display:block;width:100%;height:100%;object-fit:contain;padding:9px;box-sizing:border-box}
.logo-wrap.has-photo img{object-fit:contain;padding:9px}
.h-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:700;line-height:1.05;color:#fafafa;letter-spacing:-.01em}
.h-loc{font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;color:#5a5a62;margin-top:6px}
.h-sub{font-size:12px;color:#3a3a3a;margin-top:7px;font-style:italic;letter-spacing:.01em;line-height:1.5}
/* adaptive record hero */
.rec-hero{margin-top:30px}
.rec-pulse{display:inline-flex;align-items:center;gap:6px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:500;color:#22c55e;margin-bottom:14px}
.rec-pulse::before{content:'';width:6px;height:6px;border-radius:50%;background:#22c55e}
.rec-num{font-family:'Barlow Condensed',sans-serif;font-weight:800;color:#fafafa;line-height:.8;font-size:80px;letter-spacing:0}
.rec-num.small{font-size:54px}
.rec-lbl{font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:#5a5a62;margin-top:12px}
.rec-since{font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;color:#3a3a42;margin-top:12px}
.rec-prior{font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;color:#4a4a52;margin-top:8px}
.rec-prior b{font-family:'Barlow Condensed',sans-serif;font-weight:800;color:#6b7280;font-size:13px}
.rec-prior .tag{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#3a3a42}
.spec-row{display:flex;align-items:baseline;justify-content:space-between;padding:12px 0;border-bottom:1px solid #101013;transition:opacity .15s}
.spec-row:active{opacity:.55}
.spec-row:last-child{border-bottom:none}
.spec-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;color:#e8e8ec}
.spec-count{font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:700;color:#fafafa;letter-spacing:-.01em}
.spec-count i{font-style:normal;font-size:11px;color:#4a4a52;font-weight:600;margin-left:3px}
.back-bar{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:95;padding:env(safe-area-inset-top) 20px 0;background:rgba(6,6,6,.96);border-bottom:1px solid #161616;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);height:calc(46px + env(safe-area-inset-top));align-items:flex-end;padding-bottom:0;display:none}
.back-bar a{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#fff;text-decoration:none;display:flex;align-items:center;gap:8px;padding-bottom:12px}
.back-bar a:active{opacity:.5}

/* ── SERVICES ──────────────────────────────────────────────────── */
.svc-section{padding:32px 24px 0}
.svc-section-title{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#2a2a2a;margin-bottom:20px}
.svc-group{margin-bottom:20px}
.svc-group-label{font-size:8px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#1e1e1e;margin-bottom:9px}
.svc-chips{display:flex;flex-wrap:wrap;gap:7px}
.svc-chip{font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;letter-spacing:.01em;color:#8a8a92;border:1px solid #17171a;border-radius:8px;padding:8px 13px;cursor:default;background:#0b0b0c;white-space:nowrap}
.svc-chip:active,.svc-chip.on{color:#c8c8cc;background:#0e0e10;border-color:#1a1a1e}

/* ── SERVICES (auto-derived from jobs) ─────────────────────────── */
.svc-row{display:flex;gap:7px;flex-wrap:wrap;padding:0 var(--g) 4px}
.svc-pill{display:inline-flex;align-items:center;gap:6px;background:#0c0c0c;border:1px solid transparent;border-radius:99px;padding:7px 14px;white-space:nowrap}
.svc-pill .svc-name{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#e0e0e0}
.svc-pill .svc-count{font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;font-weight:600;color:#555}
.svc-pill.lead .svc-name{color:var(--blue)}
.svc-pill.claimed{background:none;border-color:#1a1a1a}
.svc-pill.claimed .svc-name{color:#444}

/* ── CTA ───────────────────────────────────────────────────────── */
.cta-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:16px 22px;background:#fafafa;color:#08080a;border:none;border-radius:11px;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:700;letter-spacing:-.01em;cursor:pointer;outline:none;transition:opacity .15s}
.cta-btn:active{opacity:.85}
.cta-arrow{font-size:15px;font-weight:500;opacity:.5}
.cta-arrow{font-size:20px;font-weight:300;line-height:1}
.cta-count{font-size:11px;color:#2a2a2a;text-align:right;padding-top:10px}

/* ── STAT BAR ──────────────────────────────────────────────────── */
.stat-bar{display:grid;grid-template-columns:1fr 1fr 1fr;width:100%;border:1px solid #181818;margin-top:20px}
.sb-cell{padding:14px 8px;text-align:center;border-right:1px solid #181818}
.sb-val{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--blue);margin-bottom:4px}
.sb-lbl{font-size:8px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#282828;line-height:1.4}

/* ── SECTION LABEL ─────────────────────────────────────────────── */
/* No horizontal padding — parent .ps handles it */
.sec-lbl{font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:#5a5a62;padding-top:40px;padding-bottom:16px}

/* ── FEATURED WORK ─────────────────────────────────────────────── */
/* Carousel sits outside .ps; padding-left:var(--g) aligns first card to the rail */
#fwSec{display:none}
.fw-track{display:flex;gap:12px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-right:16px}
.fw-track::-webkit-scrollbar{display:none}
.fw-slide{flex:0 0 160px;height:110px;scroll-snap-align:start;position:relative;overflow:hidden;border-radius:6px;background:#0e0e0e;flex-shrink:0}
.fw-slide-bg{position:absolute;inset:0;overflow:hidden}
.fw-slide-bg img{width:100%;height:100%;object-fit:cover;display:block}
.fw-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.9) 0%,rgba(0,0,0,.05) 60%)}
.fw-info{position:absolute;bottom:0;left:0;right:0;padding:5px 7px}
.fw-vehicle{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:900;color:#fff;line-height:1.1;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fw-svc{font-size:8px;color:rgba(255,255,255,.45);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fw-date{font-size:7px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-top:2px}
/* No-photo slide style */
.fw-slide.no-photo{background:linear-gradient(145deg,#101010 0%,#080808 100%);border:1px solid #161616}

/* ── GOOGLE RATING ─────────────────────────────────────────────── */
.google-block{display:none;align-items:center;gap:20px;padding:24px 0;border-top:1px solid #111;text-decoration:none;color:inherit}
.google-block[href]{cursor:pointer}
.google-block[href]:active{opacity:.7}
.gb-num{font-family:'Barlow Condensed',sans-serif;font-size:48px;font-weight:900;color:#fff;line-height:1}
.gb-stars{color:#f5a623;font-size:13px;letter-spacing:2px;margin-top:5px}
.gb-div{width:1px;height:44px;background:#1a1a1a;flex-shrink:0}
.gb-meta{flex:1;min-width:0}
.gb-count{font-size:13px;color:#444;margin-bottom:4px}
.gb-lbl{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#222}
.gb-chevron{font-size:18px;color:#222;flex-shrink:0;display:none}
.google-block[href] .gb-chevron{display:block}

/* ── RECENT WORK ───────────────────────────────────────────────── */
/* No horizontal padding — parent .ps handles it */
.rw-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 0;border-bottom:1px solid #0a0a0a;transition:opacity .15s}
.rw-row:active{opacity:.55}
.rw-row:last-child{border-bottom:none}
.rw-left{flex:1;min-width:0}
.rw-vehicle{font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;color:#e8e8ec;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em}
.rw-svc{font-size:11px;color:#4a4a52;margin-top:2px}
.rw-right{text-align:right;flex-shrink:0}
.rw-seq{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;color:#8a8a92;letter-spacing:.01em}
.rw-date{font-size:11px;color:#3a3a42;margin-top:2px}
.rw-verified{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--green);margin-top:3px}
.rw-empty{padding:24px 0;font-size:12px;color:#282828;text-align:center}

/* ── FOOTER ────────────────────────────────────────────────────── */
.footer{padding-top:44px;text-align:center}
.footer-sp{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#141414}

/* ── STICKY CTA ────────────────────────────────────────────────── */
.sticky-cta{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:50;padding:14px 20px;background:rgba(6,6,6,.92);border-top:1px solid #111;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.sticky-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px 20px;background:#fafafa;color:#08080a;border:none;border-radius:11px;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:700;letter-spacing:-.01em;cursor:pointer;outline:none;transition:opacity .15s}
.sticky-btn:active{opacity:.85}

/* ── PANEL ─────────────────────────────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:98;display:none}
.overlay.open{display:block}
.panel{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:430px;max-height:92vh;overflow-y:auto;background:#080808;border-top:1px solid #1c1c1c;z-index:99;transition:transform .3s cubic-bezier(.32,.72,0,1)}
.panel.open{transform:translateX(-50%) translateY(0)}
.p-handle{width:34px;height:3px;background:#1e1e1e;border-radius:2px;margin:14px auto 20px}
.p-head{padding:0 22px 16px;border-bottom:1px solid #111}
.p-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900}
.p-sub{font-size:10px;color:#444;margin-top:3px}
.p-body{padding:20px 22px 48px}
.fl{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#444;display:block;margin-bottom:6px}
.fi,.fs{width:100%;background:#0e0e10;border:1px solid #1a1a1e;color:#fafafa;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;padding:12px 14px;outline:none;border-radius:0;-webkit-appearance:none;transition:border-color .15s}
.fi:focus,.fs:focus{border-color:var(--blue)}
.fi::placeholder{color:#242424}
.fg{margin-bottom:13px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.f-svc-note{font-size:11px;color:var(--blue);padding:0 0 8px;font-weight:500}
.f-submit{display:flex;align-items:center;justify-content:space-between;width:100%;padding:15px 20px;background:var(--blue);color:#000;border:none;border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;margin-top:8px;outline:none}
.f-submit:disabled{opacity:.4}
.f-note{font-size:9px;color:#282828;text-align:center;margin-top:10px;letter-spacing:.02em}
.f-ok{display:none;padding:48px 0;text-align:center}
.f-ok-head{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;margin-bottom:8px}
.f-ok-sub{font-size:12px;color:#444;line-height:1.6}
</style>
</head>
<body>
<div class="page">

  <!-- BACK BAR (fixed top, only shown when ?from=dashboard) -->
  <div class="back-bar" id="backBtn">
    <a href="app2.html">← &nbsp;Dashboard</a>
  </div>

  <!-- HERO -->
  <div class="hero">
    <div class="logo-wrap" id="logoWrap">SP</div>
    <div class="h-name" id="hName">Loading...</div>
    <div class="h-loc" id="hLoc" style="display:none"></div>

    <!-- Adaptive record hero: filled by renderHero() -->
    <div class="rec-hero" id="recHero" style="display:none">
      <div class="rec-pulse" id="recPulse" style="display:none"></div>
      <div class="rec-num" id="recNum">&nbsp;</div>
      <div class="rec-lbl" id="recLbl">Career Installs</div>
      <div class="rec-since" id="recSince" style="display:none"></div>
      <div class="rec-prior" id="recPrior" style="display:none"></div>
    </div>
  </div>

  <!-- SPECIALTIES — inspectable make counts, the comparison-ender. Facts, not claims. -->
  <div id="specSection" style="display:none">
    <div class="ps"><div class="sec-lbl">Most Experienced With</div><div id="specList"></div></div>
  </div>

  <!-- SERVICES -->
  <div id="svcSection" style="display:none">
    <div class="ps"><div class="sec-lbl">Services</div></div>
    <div class="svc-row" id="svcChips"></div>
  </div>

  <!-- Inline CTA removed — the sticky bottom button is the single, persistent quote action.
       Hidden ctaCount kept so JS refs never throw. -->
  <div id="ctaSection" style="display:none"><span id="ctaCount"></span></div>

  <!-- FEATURED WORK -->
  <div id="fwSec">
    <div class="ps">
      <div class="sec-lbl">Featured Work</div>
      <div class="fw-track" id="fwTrack"></div>
    </div>
  </div>

  <!-- hidden legacy stat ids (kept so old JS refs never throw) -->
  <div style="display:none"><span id="sbCareer"></span><span id="sbBestWk"></span><span id="sbBestMo"></span><span id="hSub"></span><a id="googleBlock"><span id="gbNum"></span><span id="gbStars"></span><span id="gbCount"></span></a></div>

  <!-- RECENT WORK -->
  <div class="ps">
    <div class="sec-lbl" id="rwLabel">Recent Work</div>
    <div id="rwList"></div>
  </div>

  <div class="ps footer"><div class="footer-sp">ShopPodium</div></div>
</div>

<!-- STICKY CTA -->
<div class="sticky-cta" id="stickyCta" style="display:none">
  <button class="sticky-btn" onclick="openPanel()">
    <span id="stickyLabel">Request a quote</span>
    <span class="cta-arrow">→</span>
  </button>
</div>

<!-- BOOKING OVERLAY & PANEL -->
<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="p-handle" onclick="closePanel()"></div>
  <div class="p-head">
    <div class="p-title" id="panelTitle">Request a quote</div>
    <div class="p-sub" id="panelSub"></div>
  </div>
  <div class="p-body">
    <div id="bookingForm">
      <div class="fg"><label class="fl">Your Name</label><input class="fi" id="bName" placeholder="First and last name"></div>
      <div class="fg"><label class="fl">Phone Number</label><input class="fi" id="bPhone" type="tel" placeholder="(555) 000-0000"></div>
      <div class="frow">
        <div class="fg"><label class="fl">Car Make</label><input class="fi" id="bMake" placeholder="Toyota"></div>
        <div class="fg"><label class="fl">Model</label><input class="fi" id="bModel" placeholder="Camry"></div>
      </div>
      <div class="fg">
        <label class="fl">Service</label>
        <div class="f-svc-note" id="fSvcNote" style="display:none"></div>
        <select class="fs" id="bService">
          <option value="">Select a service...</option>
          <optgroup label="Window Film">
            <option>Window Tint</option><option>Ceramic Tint</option>
            <option>Carbon Film</option><option>5% / Limo Tint</option>
            <option>Windshield Tint</option><option>Sunroof Tint</option><option>Tint Removal</option>
          </optgroup>
          <optgroup label="Paint Protection">
            <option>PPF: Partial</option><option>PPF: Full Body</option>
            <option>Hood PPF</option><option>Ceramic Coating</option>
            <option>Paint Correction</option><option>Paint Polish</option>
          </optgroup>
          <optgroup label="Vinyl & Wrap">
            <option>Full Vinyl Wrap</option><option>Color Change Wrap</option>
            <option>Partial Wrap</option><option>Hood Wrap</option>
            <option>Roof Wrap</option><option>Chrome Delete</option>
            <option>Pillar Wrap</option><option>Mirror Wrap</option>
          </optgroup>
          <optgroup label="Lighting">
            <option>Headlight Tint</option><option>Tail Light Tint</option>
            <option>LED Upgrade</option><option>Underglow</option><option>Interior LED</option>
          </optgroup>
          <optgroup label="Electronics & Audio">
            <option>Audio System</option><option>Subwoofer Install</option>
            <option>Remote Start</option><option>Dash Cam</option>
            <option>Backup Camera</option><option>Apple CarPlay</option>
          </optgroup>
          <optgroup label="Custom">
            <option>Detailing</option><option>Blackout Package</option>
            <option>Full Custom Package</option><option>Other / Ask Me</option>
          </optgroup>
        </select>
      </div>
      <div class="fg"><label class="fl">Timing</label><input class="fi" id="bTime" placeholder="ASAP, this week, flexible..."></div>
      <div class="fg">
        <label class="fl">Best Way to Reach You</label>
        <select class="fs" id="bContactPref"><option value="Text">Text me</option><option value="Call">Call me</option></select>
      </div>
      <div class="fg" style="display:flex;align-items:center;gap:10px;padding:4px 0">
        <input type="checkbox" id="bRepeat" style="width:14px;height:14px;accent-color:var(--blue);flex-shrink:0">
        <label for="bRepeat" style="font-size:12px;color:#444;cursor:pointer">I'm a returning customer</label>
      </div>
      <button class="f-submit" id="bookBtn" onclick="submitBooking()">
        <span>Send Request</span><span style="font-size:18px;font-weight:300">→</span>
      </button>
      <div class="f-note">Typically responds within 24 hours</div>
    </div>
    <div class="f-ok" id="successState">
      <div class="f-ok-head">Request Sent</div>
      <div class="f-ok-sub" id="bookingSub"></div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://cajerxgiwbgevfjzkkoy.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNhamVyeGdpd2JnZXZmanpra295Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NDY0NDcsImV4cCI6MjA5NjAyMjQ0N30.8dCTpfeWkdUIjmKGgfnrOqlBa1jIwDt_yqg3Dlt1a0M';
const {createClient}=supabase;
const sb=createClient(SUPABASE_URL,SUPABASE_KEY);
const $=(id)=>document.getElementById(id);
const set=(id,v)=>{const e=$(id);if(e)e.textContent=v};
let shopId=null, selectedSvc='';

// ── SERVICE SELECTION ─────────────────────────────────────────────
function pickSvc(el) {
  document.querySelectorAll('.p-svc').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  selectedSvc = el.textContent;
  set('ctaLabel', 'Request a quote · ' + selectedSvc);
  set('stickyLabel', 'Request a quote · ' + selectedSvc);
  const note = $('fSvcNote');
  if (note) { note.textContent = 'Selected: ' + selectedSvc; note.style.display='block'; }
  const sel = $('bService');
  if (sel) {
    for (const opt of sel.options) {
      if (opt.text === selectedSvc) { sel.value = opt.value || opt.text; break; }
    }
  }
}

// Render profile services — auto-derived from logged jobs, with counts.
// Logged services lead (sorted by count); manually-claimed services that
// haven't been logged yet sit quieter at the end.
// Specialties — inspectable make counts. The comparison-ender: "they've done MINE."
// Facts computed from the record, not claims. Gated at 3+ so a thin pattern stays hidden.
function renderSpecialties(jobs) {
  const sec = $('specSection');
  const list = $('specList');
  if (!sec || !list) return;
  const counts = {};
  jobs.forEach(j => {
    const make = (j.car_make || '').trim();
    if (!make) return;
    const key = make.toLowerCase();
    if (!counts[key]) counts[key] = { name: make, n: 0 };
    counts[key].n++;
  });
  const ranked = Object.values(counts)
    .filter(c => c.n >= 3)          // under 3 isn't a specialty, don't claim it
    .sort((a, b) => b.n - a.n)
    .slice(0, 4);
  if (!ranked.length) { sec.style.display = 'none'; return; }
  list.innerHTML = ranked.map(c =>
    `<div class="spec-row" onclick="filterRecordByMake('${c.name.replace(/'/g,"\\'")}')">
      <span class="spec-name">${c.name}</span>
      <span class="spec-count">${c.n.toLocaleString()}<i> installs</i></span>
    </div>`).join('');
  sec.style.display = 'block';
}

// Tapping a specialty scrolls to the record and filters it to that make.
let _recordFilter = null;
function filterRecordByMake(make) {
  _recordFilter = (_recordFilter === make) ? null : make;
  renderRecent(window._allJobs || []);
  const rw = document.getElementById('rwList');
  if (rw) rw.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function renderProfileServices(trade, jobs) {
  const sec = $('svcSection');
  const chips = $('svcChips');
  if (!sec || !chips) return;

  // Count jobs per service (the job's `trade` field holds the service name)
  const counts = {};
  (jobs || []).forEach(j => {
    const svc = (j.trade || '').trim();
    if (svc) counts[svc] = (counts[svc] || 0) + 1;
  });

  // Logged services, sorted high to low
  const logged = Object.keys(counts).sort((a, b) => counts[b] - counts[a]);

  // Manually-claimed services from profile.trade that aren't logged yet
  const claimed = (trade || '')
    .split(',').map(s => s.trim()).filter(Boolean)
    .filter(s => !logged.some(l => l.toLowerCase() === s.toLowerCase()));

  if (!logged.length && !claimed.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';

  const pills = [];
  logged.forEach((s, i) => {
    pills.push(
      `<div class="svc-pill${i === 0 ? ' lead' : ''}">
        <span class="svc-name">${s}</span>
        <span class="svc-count">${counts[s]}</span>
      </div>`
    );
  });
  claimed.forEach(s => {
    pills.push(`<div class="svc-pill claimed"><span class="svc-name">${s}</span></div>`);
  });

  chips.innerHTML = pills.join('');
}

// ── PANEL ─────────────────────────────────────────────────────────
function openPanel() {
  $('panel').classList.add('open');
  $('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closePanel() {
  $('panel').classList.remove('open');
  $('overlay').classList.remove('open');
  document.body.style.overflow='';
}

// ── HELPERS ───────────────────────────────────────────────────────
function getPhotos(j) {
  if (!j.photos) return [];
  if (Array.isArray(j.photos)) return j.photos;
  try { return JSON.parse(j.photos); } catch(e) { return []; }
}
function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('en-US',{month:'short',year:'numeric'});
}
function inject(container, src, alt, position) {
  const img=document.createElement('img');
  img.alt=alt||'';img.loading='lazy';
  img.style.objectPosition='center '+(position||'bottom');
  img.onerror=function(){this.remove()};
  container.appendChild(img);
  img.src=src;
}
function applyAccent(hex) {
  if(hex&&/^#[0-9a-fA-F]{6}$/.test(hex))
    document.documentElement.style.setProperty('--blue',hex);
}

// ── FEATURED WORK ─────────────────────────────────────────────────
function renderFeatured(jobs) {
  const sec=$('fwSec'), track=$('fwTrack');
  if (!sec||!track) return;
  // Show up to 10 jobs — with or without photos (photos are the visual)
  const shown = jobs.slice(0, 10);
  if (!shown.length) { sec.style.display='none'; return; }
  sec.style.display='block';
  const photoJobs = shown.filter(j=>getPhotos(j).length>0);
  const noPhotoJobs = shown.filter(j=>!getPhotos(j).length);
  // Put photo jobs first
  const ordered = [...photoJobs, ...noPhotoJobs];
  track.innerHTML = ordered.map((j,i)=>{
    const v=[j.car_year,j.car_make,j.car_model].filter(Boolean).join(' ')||'Vehicle';
    const svc=j.job_type||j.trade||'';
    const dt=j.created_at?fmtDate(j.created_at):'';
    const hasPhoto=getPhotos(j).length>0;
    return `<div class="fw-slide${hasPhoto?'':' no-photo'}" data-fwi="${i}">
      <div class="fw-slide-bg"></div>
      <div class="fw-grad"></div>
      <div class="fw-info">
        <div class="fw-vehicle">${v}</div>
        ${svc?`<div class="fw-svc">${svc}</div>`:''}
        ${dt?`<div class="fw-date">${dt}</div>`:''}
      </div>
    </div>`;
  }).join('');
  // Inject photos via DOM
  ordered.forEach((j,i)=>{
    const photos=getPhotos(j);
    if(!photos.length)return;
    const bg=track.querySelector(`[data-fwi="${i}"] .fw-slide-bg`);
    if(bg) inject(bg,photos[0],[j.car_make,j.car_model].filter(Boolean).join(' '), j.photo_position);
  });
}

// ── RECENT WORK ───────────────────────────────────────────────────
function renderRecent(jobs) {
  const el=$('rwList');
  if(!el)return;
  const total=jobs.length;
  // assign permanent sequence numbers FIRST (newest=total), then filter — so a
  // filtered row keeps its true Nº regardless of what's shown.
  const withSeq = jobs.map((j,i)=>({ j, seq: total-i }));
  const filtered = _recordFilter
    ? withSeq.filter(x => (x.j.car_make||'').trim().toLowerCase() === _recordFilter.toLowerCase())
    : withSeq;
  const recent = filtered.slice(0,5);

  // filter chip / heading state
  const lbl = document.getElementById('rwLabel');
  if (lbl) lbl.innerHTML = _recordFilter
    ? `${_recordFilter} · <span style="color:var(--blue);cursor:pointer" onclick="filterRecordByMake('${_recordFilter.replace(/'/g,"\\'")}')">clear</span>`
    : 'Recent Work';

  if(!recent.length){el.innerHTML='<div class="rw-empty">No matching installs.</div>';return;}
  el.innerHTML=recent.map(({j,seq})=>{
    const v=[j.car_year,j.car_make,j.car_model].filter(Boolean).join(' ')||'Vehicle';
    const svc=j.job_type||j.trade||'';
    const d=fmtDate(j.created_at);
    const href='shoppodium-install.html?shop='+encodeURIComponent(shopId)+'&n='+seq;
    return `<a class="rw-row" href="${href}" style="text-decoration:none;color:inherit;cursor:pointer">
      <div class="rw-left">
        <div class="rw-vehicle">${v}</div>
        ${svc?`<div class="rw-svc">${svc}</div>`:''}
      </div>
      <div class="rw-right">
        <div class="rw-seq">Nº ${seq.toLocaleString()}</div>
        <div class="rw-date">${d}</div>
        ${j.verified?'<div class="rw-verified">Verified</div>':''}
      </div>
    </a>`;
  }).join('');
}

// ── STATS ─────────────────────────────────────────────────────────
// ── ADAPTIVE RECORD HERO ──────────────────────────────────────────
// Established shops (>=25 installs) lead with the career number.
// New shops keep the honest number visible but let recency carry the top.
function renderHero(jobs, profile) {
  const hero = $('recHero');
  if (!hero) return;
  const total = jobs.length;

  const noun = careerNounFor(jobs);
  const nounLabel = 'Career ' + (noun === 'jobs' ? 'Jobs' : 'Installs');

  // pulse — days since last install
  let pulseTxt = '';
  if (total) {
    const last = jobs.reduce((m, j) => Math.max(m, new Date(j.created_at).getTime()), 0);
    const days = Math.floor((Date.now() - last) / 86400000);
    if (days <= 0) pulseTxt = 'Last install today';
    else if (days === 1) pulseTxt = 'Last install yesterday';
    else if (days <= 45) pulseTxt = 'Last install ' + days + ' days ago';
    // older than 45 days: no pulse (stale pulse hurts more than helps)
  }

  // since — prefer the shop's founding year (verifiable tenure) over first-logged-job date
  let sinceTxt = '';
  const founded = parseInt(profile.founded_year, 10);
  if (founded && founded > 1950 && founded <= new Date().getFullYear()) {
    sinceTxt = 'In business since ' + founded;
  } else if (total) {
    const first = jobs.reduce((m, j) => Math.min(m, new Date(j.created_at).getTime()), Infinity);
    const d = new Date(first);
    const mo = d.getMonth();
    const season = mo<=1||mo===11 ? 'winter' : mo<=4 ? 'spring' : mo<=7 ? 'summer' : 'fall';
    const yr = d.getFullYear(), nowYr = new Date().getFullYear();
    sinceTxt = (yr < nowYr) ? 'Building since ' + yr : 'Started this ' + season;
  }

  // self-estimated prior work — shown SEPARATELY from the verified count, always labeled.
  // This is the shop's own claim; it never merges with or inflates the earned number.
  const priorEl = $('recPrior');
  const prior = parseInt(profile.installs_before, 10);
  if (priorEl && prior && prior > 0) {
    priorEl.innerHTML = '<b>~' + prior.toLocaleString() + '</b> before Shop Podium <span class="tag">· self-estimated</span>';
    priorEl.style.display = 'block';
  } else if (priorEl) {
    priorEl.style.display = 'none';
  }

  // last-30 count for the momentum line
  const cutoff = Date.now() - 30*86400000;
  const last30 = jobs.filter(j => new Date(j.created_at).getTime() >= cutoff).length;

  const numEl = $('recNum'), pulseEl = $('recPulse'), lblEl = $('recLbl'), sinceEl = $('recSince');
  hero.style.display = 'block';
  numEl.textContent = total ? total.toLocaleString() : '0';
  lblEl.textContent = total === 1 ? nounLabel.replace(/s$/, '') : nounLabel;

  const ESTABLISHED = 25;
  if (total >= ESTABLISHED) {
    // Number is the hero. Pulse sits above as confirmation, since below.
    numEl.classList.remove('small');
    if (pulseTxt) { pulseEl.textContent = pulseTxt; pulseEl.style.display = 'inline-flex'; }
    if (sinceTxt) { sinceEl.textContent = sinceTxt; sinceEl.style.display = 'block'; }
  } else {
    // New shop: momentum leads. Pulse on top, honest number smaller, since + last-30 carry weight.
    numEl.classList.add('small');
    if (pulseTxt) { pulseEl.textContent = pulseTxt; pulseEl.style.display = 'inline-flex'; }
    // fold since + last-30 into the since line for a confident young-shop read
    const parts = [];
    if (sinceTxt) parts.push(sinceTxt);
    if (last30 > 0) parts.push(last30 + ' in the last 30 days');
    if (parts.length) { sinceEl.textContent = parts.join('  ·  '); sinceEl.style.display = 'block'; }
    // move the label to sit under the number as the quiet anchor
    lblEl.textContent = nounLabel + (sinceTxt ? '' : '');
  }
}

function careerNounFor(jobs) {
  const INSTALL = ['tint','wrap','ppf','ceramic','graphics','lighting','wheels','powder','paint'];
  const anyInstall = jobs.some(j => {
    const t = (j.trade || j.job_type || '').toLowerCase();
    return INSTALL.some(k => t.includes(k));
  });
  // default to installs unless the record is clearly non-install work
  return anyInstall || !jobs.length ? 'installs' : 'jobs';
}

function calcAndRender(jobs) {
  const now=new Date();
  const total=jobs.length;
  const mo={},wk={};
  jobs.forEach(j=>{
    const d=new Date(j.created_at);
    const mk=d.getFullYear()+'-'+d.getMonth(); mo[mk]=(mo[mk]||0)+1;
    const wk_k=Math.floor(d.getTime()/(7*24*60*60*1000)); wk[wk_k]=(wk[wk_k]||0)+1;
  });
  const bestMo=Object.values(mo).length?Math.max(...Object.values(mo)):0;
  const bestWk=Object.values(wk).length?Math.max(...Object.values(wk)):0;
  set('sbCareer',total||'—');
  set('sbBestWk',bestWk||'—');
  set('sbBestMo',bestMo||'—');
  if(total>0){const s=$('ctaCount');if(s)s.textContent=total+' installs completed';}
}

// ── INIT ──────────────────────────────────────────────────────────
async function init() {
  const p=new URLSearchParams(window.location.search);
  shopId=p.get('id');
  if(!shopId){set('hName','Profile not found.');return;}

  const [{data:profile},{data:jobs}]=await Promise.all([
    sb.from('profiles').select('*').eq('id',shopId).single(),
    sb.from('jobs').select('*').eq('tinter_id',shopId).order('created_at',{ascending:false})
  ]);
  if(!profile){set('hName','Profile not found.');return;}
  if(profile.accent_color) applyAccent(profile.accent_color);

  const allJobs=jobs||[];
  const fullName=profile.full_name||'';
  const bizName=profile.shop_name||'';
  const title=profile.slogan||'Window Tint Specialist';
  const loc=[profile.city,profile.state].filter(Boolean).join(', ');

  document.title=(bizName||fullName)+' · ShopPodium';

  // Logo
  const logoEl=$('logoWrap');
  logoEl.innerHTML='';
  if(profile.profile_photo){
    const img=document.createElement('img');
    // no inline object-fit — let the CSS govern (contain, so logos never crop)
    img.alt=bizName||fullName;
    img.onerror=function(){this.remove();logoEl.classList.remove('has-photo');logoEl.textContent=(bizName||fullName||'SP').replace(/[^a-zA-Z]/g,'').slice(0,2).toUpperCase();};
    img.onload=function(){logoEl.classList.add('has-photo');};
    logoEl.appendChild(img);
    img.src=profile.profile_photo;
  } else {
    logoEl.classList.remove('has-photo');
    logoEl.textContent=(bizName||fullName||'SP').replace(/[^a-zA-Z]/g,'').slice(0,2).toUpperCase();
  }

  // Back button — only when linked from dashboard
  if (p.get('from') === 'dashboard') {
    const bb = $('backBtn');
    if (bb) {
      bb.style.display = 'flex';
      document.querySelector('.page').style.paddingTop = 'calc(46px + env(safe-area-inset-top))';
    }
  }

  // Name + subtitle (city, state · shop name)
  set('hName', bizName || fullName || '');
  const locEl = $('hLoc');
  if (locEl && loc) { locEl.textContent = loc; locEl.style.display = 'block'; }
  // Track this profile view silently — no await, fire and forget
  if (shopId) {
    sb.functions.invoke('track-profile-view', { body: { shop_id: shopId } }).catch(() => {});
  }

  // Paid gating — Get a Quote only for paid tinters
  // Booking is available to every shop. A profile a customer can't act on wins
  // zero customers, so the contact path is core, not a paid upsell. The single
  // persistent quote action is the sticky bottom button.
  const stickyCta = $('stickyCta');
  if (stickyCta) stickyCta.style.display = 'block';

  // Panel sub
  set('panelTitle','Request a quote');
  set('panelSub','Reach '+(bizName||fullName)+' directly.');

  // Render sections
  window._allJobs = allJobs;
  renderProfileServices(profile.trade, allJobs);
  renderSpecialties(allJobs);
  renderHero(allJobs, profile);
  calcAndRender(allJobs);
  renderFeatured(allJobs);
  renderRecent(allJobs);
  if (new URLSearchParams(location.search).get('welcome') === '1') playWelcomeReveal(allJobs.length);
}

// ── THE REVEAL (welcome=1) — the real page, arriving as one object ─
// The sacred 0->1 tick fires only here, only when the record truly is 1.
function playWelcomeReveal(total) {
  if (total !== 1) return;
  const numEl = $('recNum');
  if (numEl) {
    numEl.textContent = '0';
    setTimeout(() => {
      const t0 = performance.now();
      (function step(t){
        const p = Math.min(1, (t - t0) / 700);
        numEl.textContent = Math.round(1 - Math.pow(1 - p, 3)).toString();
        if (p < 1) requestAnimationFrame(step); else numEl.textContent = '1';
      })(t0);
    }, 600);
  }
  const ov = document.createElement('div');
  ov.style.cssText = 'position:fixed;left:0;right:0;bottom:0;background:linear-gradient(to top,#08080a 78%,rgba(8,8,10,0));padding:46px 26px 34px;z-index:60;text-align:center;opacity:0;transform:translateY(10px);transition:opacity .5s ease,transform .5s cubic-bezier(.22,1,.36,1)';
  ov.innerHTML = `
    <div id="wvHead" style="font-family:'Plus Jakarta Sans',sans-serif;font-size:20px;font-weight:700;color:#fafafa;letter-spacing:-.01em">Your record has begun.</div>
    <div id="wvSub" style="font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;color:#6b7280;margin-top:9px;line-height:1.65">Every install strengthens your reputation.<br>Every customer makes this page more valuable.</div>
    <div id="wvPlaces" style="display:none;flex-direction:column;gap:9px;margin:16px 0 2px"></div>
    <button id="wvBtn" style="width:100%;max-width:340px;margin:20px auto 0;display:block;padding:15px;background:#fafafa;color:#08080a;border:none;border-radius:11px;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer">Continue</button>`;
  document.body.appendChild(ov);
  setTimeout(() => { ov.style.opacity = '1'; ov.style.transform = 'translateY(0)'; }, 1500);
  let stage = 1;
  document.getElementById('wvBtn').onclick = function(){
    if (stage === 1) {
      stage = 2;
      document.getElementById('wvHead').innerHTML = 'One record.<br>Everywhere customers find you.';
      document.getElementById('wvSub').textContent = 'Every install strengthens the same page, no matter where someone finds your shop.';
      // the duplicate lifts away toward the destinations; the original never moves
      const lift = document.createElement('div');
      lift.style.cssText='width:118px;height:60px;margin:2px auto 12px;border-radius:8px;background:#0e0e11;border:1px solid #1a1a1e;display:flex;align-items:center;justify-content:center;font-family:\'Barlow Condensed\',sans-serif;font-weight:800;color:#fafafa;font-size:17px;opacity:0;transform:translateY(12px);transition:opacity .5s ease,transform .8s cubic-bezier(.22,1,.36,1)';
      lift.textContent='N\u00ba 1';
      const pl = document.getElementById('wvPlaces');
      pl.parentElement.insertBefore(lift, pl);
      requestAnimationFrame(()=>{ lift.style.opacity='1'; lift.style.transform='translateY(0)'; });
      setTimeout(()=>{ lift.style.opacity='.4'; lift.style.transform='translateY(-10px) scale(.96)'; }, 700);
      pl.style.display = 'flex';
      pl.innerHTML = ['Instagram','Facebook','TikTok','Messages','Website','QR Code'].map((d,i)=>
        `<span style="font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#4a4a52;opacity:0;transform:translateY(5px);transition:opacity .45s ease ${.1+i*.11}s,transform .45s ease ${.1+i*.11}s">${d}</span>`).join('');
      requestAnimationFrame(()=>{ [...pl.children].forEach(s=>{ s.style.opacity='1'; s.style.transform='none'; }); });
      this.textContent = 'Open Dashboard';
    } else {
      // the dashboard is already live; its own arrival plays on landing
      window.location.href = 'app2.html';
    }
  };
}

// ── BOOKING ───────────────────────────────────────────────────────
async function submitBooking() {
  const name=$('bName').value.trim();
  const phone=$('bPhone').value.trim();
  const service=$('bService').value;
  if(!name||!phone||!service){alert("Need your name, phone, and the service you're after.");return;}
  const btn=$('bookBtn');
  btn.disabled=true;btn.querySelector('span').textContent='Sending...';
  const carMake=$('bMake').value.trim();
  const carModel=$('bModel').value.trim();
  const prefTime=$('bTime').value.trim();
  const contactPref=$('bContactPref').value||'Text';
  const {error}=await sb.from('booking_requests').insert({
    shop_id:shopId,customer_name:name,customer_phone:phone,
    car_make:carMake,car_model:carModel,service,
    preferred_time:prefTime,notes:'Contact: '+contactPref,
    is_repeat_customer:$('bRepeat').checked,status:'new'
  });
  if(!error){
    try{
      const {data:pr}=await sb.from('profiles').select('phone,shop_name,full_name').eq('id',shopId).single();
      if(pr?.phone){
        const car=[carMake,carModel].filter(Boolean).join(' ')||'vehicle';
        const msg=`New quote request!\n\n${name}\n${service}${car?' - '+car:''}\nContact: ${phone} (prefers ${contactPref})${prefTime?'\nTiming: '+prefTime:''}\n\nshoppodium.vercel.app`;
        await sb.functions.invoke('send-sms',{body:{to:pr.phone,message:msg,type:'booking_notification'}});
      }
    }catch(e){console.warn('SMS:',e);}
    $('bookingForm').style.display='none';
    $('successState').style.display='block';
    const n=document.getElementById('hName').textContent||'The shop';
    set('bookingSub',n+' will be in touch soon.');
  } else {
    btn.disabled=false;btn.querySelector('span').textContent='Send Request';
    alert("Didn't go through. Try again.");
  }
}
