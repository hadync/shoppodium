<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ShopPodium</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Plus Jakarta Sans',sans-serif;-webkit-font-smoothing:antialiased;background:#000;color:#fff}

.screen{position:fixed;inset:0;overflow-y:auto;transition:opacity .45s ease}
.screen.off{opacity:0;pointer-events:none}

/* ── SCREEN 1 — HOOK ─────────────────────────────────────────────────── */
#s1{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px 28px}
.h1-brand{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;text-align:center;color:#fff;margin-bottom:20px}
.h1-brand span{color:#18aef0}
.h1-stage{display:flex;align-items:center;justify-content:center;width:100%}
.h1-cardwrap{width:100%;max-width:260px;position:relative;aspect-ratio:1/1}
/* the cycling card */
.hook-card{position:absolute;inset:0;border-radius:6px;overflow:hidden;background:#0a0c10;opacity:0;transform:scale(.96);transition:opacity .7s ease,transform .7s ease}
.hook-card.show{opacity:1;transform:scale(1)}
.hc-photo{position:absolute;inset:0;background-size:cover;background-position:center}
.hc-stripe{position:absolute;left:0;top:0;bottom:0;width:2px;background:#18aef0;z-index:3}
.hc-grad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.85) 0%,rgba(0,0,0,.25) 38%,rgba(0,0,0,.08) 55%,rgba(0,0,0,.72) 80%,rgba(0,0,0,.95) 100%);z-index:1}
.hc-glow{position:absolute;inset:0;background:radial-gradient(ellipse at 4% 50%,rgba(24,174,240,.07) 0%,transparent 55%);z-index:2}
.hc-top{position:absolute;top:0;left:0;right:0;padding:13px 13px 0 16px;z-index:4;display:flex;align-items:flex-start;justify-content:space-between}
.hc-shop{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.32)}
.hc-num{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:#18aef0;line-height:1}
.hc-numlbl{font-family:'Plus Jakarta Sans',sans-serif;font-size:7px;color:rgba(255,255,255,.28);text-transform:uppercase;letter-spacing:.05em;text-align:right;margin-top:1px}
.hc-bot{position:absolute;bottom:0;left:0;right:0;padding:0 13px 14px 16px;z-index:4}
.hc-car{font-family:'Barlow Condensed',sans-serif;font-weight:900;color:rgba(255,255,255,.6);line-height:.9;font-size:18px;margin-bottom:7px}
.hc-spec{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:21px;letter-spacing:-.02em;line-height:1.05;color:#fff;margin-bottom:9px}
.hc-spec .l2{color:#18aef0}
.hc-foot{display:flex;align-items:center;justify-content:space-between}
.hc-film{font-family:'Plus Jakarta Sans',sans-serif;font-size:9px;color:rgba(255,255,255,.25)}
.hc-ver{display:flex;align-items:center;gap:4px;font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:700;letter-spacing:.06em;color:#22c55e}
/* dots */
.h1-dots{display:flex;gap:5px;justify-content:center;margin-top:14px}
.h1-dot{width:5px;height:5px;border-radius:50%;background:#1e1e1e;transition:background .4s}
.h1-dot.on{background:#18aef0}
/* copy + cta */
.h1-foot{text-align:center;margin-top:28px;width:100%}
.h1-headline{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;line-height:.94;letter-spacing:-.01em;color:#fff;margin-bottom:8px}
.h1-sub{font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;color:#6b7280;line-height:1.45;margin-bottom:20px;max-width:260px;margin-left:auto;margin-right:auto}
.h1-cta{width:100%;max-width:300px;margin:0 auto;display:block;padding:15px;background:#18aef0;color:#000;border:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:700;letter-spacing:-.02em;cursor:pointer}
.h1-cta:active{opacity:.85}
.h1-signin{display:block;text-align:center;padding:14px 0 0;font-size:11px;color:#2a2a2a;background:none;border:none;cursor:pointer;width:100%;font-family:'Plus Jakarta Sans',sans-serif}
.h1-signin b{color:#6b7280;font-weight:600}

/* ── SCREEN 2 — WHAT YOU GET ─────────────────────────────────────────── */
#s2{display:flex;flex-direction:column;min-height:100vh;justify-content:center}
.s2-top{padding:52px 28px 0}
.s2-eyebrow{font-size:10px;font-weight:600;color:#383840;letter-spacing:.14em;text-transform:uppercase;margin-bottom:20px}
.s2-headline{font-family:'Barlow Condensed',sans-serif;font-size:52px;font-weight:900;line-height:.88;letter-spacing:-.01em;margin-bottom:28px}
.s2-headline .hl-blue{color:#18aef0}
.s2-list{display:flex;flex-direction:column;gap:18px;margin-bottom:20px}
.s2-item{display:flex;align-items:flex-start;gap:14px}
.s2-num{font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;color:#18aef0;width:20px;flex-shrink:0;padding-top:1px}
.s2-text{font-size:14px;color:#6b7280;line-height:1.5}
.s2-text strong{color:#f0f0f2;font-weight:500}
.s2-bottom{padding:16px 28px 40px}
.s2-cta{width:100%;padding:16px;background:#18aef0;color:#000;border:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:700;letter-spacing:-.02em;cursor:pointer;border-radius:0}
.s2-cta:active{opacity:.85}
.s2-skip{display:block;text-align:center;padding:14px 0 0;font-size:11px;color:#2a2a2a;cursor:pointer;background:none;border:none;width:100%;font-family:'Plus Jakarta Sans',sans-serif}

/* ── SCREEN 3 — ACCOUNT ─────────────────────────────────────────────── */
#s3{display:flex;flex-direction:column;justify-content:center;min-height:100vh;padding:52px 28px}
.s3-logo{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;margin-bottom:48px}
.s3-logo span{color:#18aef0}
.s3-tabs{display:flex;gap:0;margin-bottom:36px;border-bottom:1px solid #111}
.s3-tab{font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:0 0 12px;margin-right:24px;background:none;border:none;cursor:pointer;color:#2a2a2a;border-bottom:1.5px solid transparent;margin-bottom:-1px;transition:all .15s}
.s3-tab.on{color:#f0f0f2;border-bottom-color:#18aef0}
.s3-heading{font-family:'Barlow Condensed',sans-serif;font-size:38px;font-weight:900;line-height:.88;margin-bottom:32px}
.f-group{margin-bottom:20px}
.f-label{font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#383840;margin-bottom:8px;display:block}
.f-input{width:100%;background:#000;border:none;border-bottom:1px solid #1a1a1e;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;padding:10px 0;outline:none;transition:border-color .15s;-webkit-appearance:none;border-radius:0}
.f-input:focus{border-bottom-color:#18aef0}
.f-input::placeholder{color:#252530}
.f-btn{width:100%;padding:15px;background:#18aef0;color:#000;border:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:700;letter-spacing:-.02em;cursor:pointer;margin-top:8px;border-radius:0;transition:opacity .15s}
.f-btn:disabled{opacity:.35;cursor:not-allowed}
.f-btn:active{opacity:.85}
.f-err{font-size:11px;color:#ef4444;min-height:16px;display:block;margin-top:10px}
</style>
</head>
<body>

<!-- SCREEN 1 — HOOK -->
<div class="screen" id="s1">
  <div class="h1-brand">Shop<span>Podium</span></div>
  <div class="h1-stage">
    <div class="h1-cardwrap" id="hookStage"></div>
  </div>
  <div class="h1-dots" id="hookDots"></div>
  <div class="h1-foot">
    <div class="h1-headline">Every job you've done,<br>finally counts.</div>
    <div class="h1-sub">The install record your customers actually trust.</div>
    <button class="h1-cta" onclick="startRecord()">Start my record →</button>
    <button class="h1-signin" onclick="transition('s1','s3');setMode('signin')">Already have an account? <b>Sign in</b></button>
  </div>
</div>

<!-- SCREEN 3 — ACCOUNT -->
<div class="screen off" id="s3">
  <div class="s3-logo">Shop<span>Podium</span></div>

  <!-- Pinned install card (onboarding save mode only) -->
  <div id="savedCardWrap" style="display:none;margin-bottom:28px">
    <div id="savedCard" style="aspect-ratio:1.6/1;max-width:200px;position:relative;overflow:hidden;background:#0a0c10;border-radius:5px"></div>
    <div style="font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;color:#2a2a2a;margin-top:10px;letter-spacing:.04em">Install #1 — ready to save</div>
  </div>

  <div class="s3-tabs">
    <button class="s3-tab on" id="tabCreate" onclick="setMode('create')">Create account</button>
    <button class="s3-tab" id="tabSign" onclick="setMode('signin')">Sign in</button>
  </div>

  <!-- CREATE -->
  <div id="createFields">
    <div class="s3-heading" id="createHeading">Create your<br>account</div>
    <div class="f-group"><label class="f-label">Your name</label><input class="f-input" id="fName" placeholder="Jake Martinez" autocomplete="name"></div>
    <div class="f-group"><label class="f-label">Email</label><input class="f-input" id="fEmail" type="email" placeholder="jake@yourtintshop.com" autocomplete="email"></div>
    <div class="f-group"><label class="f-label">Password</label><input class="f-input" id="fPass" type="password" placeholder="Minimum 8 characters" autocomplete="new-password"></div>
    <button class="f-btn" id="createBtn" onclick="handleCreate()">Create account →</button>
    <span class="f-err" id="createErr"></span>
  </div>

  <!-- SIGN IN -->
  <div id="signinFields" style="display:none">
    <div class="s3-heading">Welcome<br>back</div>
    <div class="f-group"><label class="f-label">Email</label><input class="f-input" id="siEmail" type="email" placeholder="your@email.com" autocomplete="email"></div>
    <div class="f-group"><label class="f-label">Password</label><input class="f-input" id="siPass" type="password" placeholder="Your password" autocomplete="current-password"></div>
    <button class="f-btn" id="signinBtn" onclick="handleSignin()">Sign in →</button>
    <span class="f-err" id="signinErr"></span>
  </div>
</div>

<script>
const SUPABASE_URL='https://cajerxgiwbgevfjzkkoy.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNhamVyeGdpd2JnZXZmanpra295Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NDY0NDcsImV4cCI6MjA5NjAyMjQ0N30.8dCTpfeWkdUIjmKGgfnrOqlBa1jIwDt_yqg3Dlt1a0M';
const{createClient}=supabase;
const sb=createClient(SUPABASE_URL,SUPABASE_KEY);

sb.auth.getSession().then(({data:{session}})=>{if(session)window.location.href='app2.html';});

// ── SAVE MODE — returning from job entry with a pending install ────────────
const SAVE_MODE = new URLSearchParams(location.search).get('save') === '1';

function renderPendingCard(){
  let job;
  try{ job = JSON.parse(sessionStorage.getItem('sp_pending_job')||'null'); }catch(e){ job=null; }
  if(!job) return false;

  const wrap = document.getElementById('savedCardWrap');
  const card = document.getElementById('savedCard');
  const heading = document.getElementById('createHeading');
  if(!wrap||!card) return false;

  const car = [job.car_year,job.car_make,job.car_model].filter(Boolean).join(' ') || 'Your install';
  const spec = [job.vlt_percent?job.vlt_percent+'%':'', job.job_type||''].filter(Boolean).join(' ');
  const photo = (job.photos&&job.photos[0]) ? `background-image:url(${job.photos[0]});background-size:cover;background-position:center` : 'background:linear-gradient(150deg,#1a2230,#0a0e16)';

  card.innerHTML = `
    <div style="position:absolute;inset:0;${photo}"></div>
    <div style="position:absolute;left:0;top:0;bottom:0;width:2px;background:#18aef0"></div>
    <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.92) 0%,rgba(0,0,0,.2) 60%,rgba(0,0,0,.5) 100%)"></div>
    <div style="position:absolute;bottom:0;left:0;right:0;padding:0 10px 10px 12px">
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:13px;color:rgba(255,255,255,.6);line-height:.9;margin-bottom:4px">${car.toUpperCase()}</div>
      <div style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:14px;color:#fff;letter-spacing:-.02em">${spec}</div>
    </div>`;
  wrap.style.display = 'block';
  if(heading) heading.innerHTML = 'Save your<br>record.';
  return true;
}

if(SAVE_MODE){
  window.addEventListener('DOMContentLoaded',()=>{
    const has = renderPendingCard();
    // jump straight to account screen, skip the hook
    const s1 = document.getElementById('s1');
    const s3 = document.getElementById('s3');
    if(s1) s1.classList.add('off');
    if(s3) s3.classList.remove('off');
  });
}

// ── HOOK CARD CYCLE ───────────────────────────────────────────────────────
const HOOK_CARDS = [
  { shop:'Cleancutz Auto', num:'247', car:'2022 Volvo CX', l1:'5% all around', l2:'+ 35% shield', film:'SunTek Ceramic', grad:'linear-gradient(150deg,#1a2230,#0a0e16)' },
  { shop:'Starr Custom Tint', num:'612', car:'2024 BMW M4', l1:'20% full', l2:'ceramic', film:'XPEL XR Plus', grad:'linear-gradient(150deg,#241a28,#100a18)' },
  { shop:'Apex Tint Co', num:'389', car:'2023 Tesla M3', l1:'15% all around', l2:'+ windshield', film:'LLumar CTX', grad:'linear-gradient(150deg,#16242a,#0a1014)' },
];

let hookIdx = 0;
function buildHookCard(d){
  return `<div class="hook-card">
    <div class="hc-photo" style="background:${d.grad}"></div>
    <div class="hc-stripe"></div><div class="hc-glow"></div><div class="hc-grad"></div>
    <div class="hc-top">
      <div class="hc-shop">${d.shop}</div>
      <div><div class="hc-num">${d.num}</div><div class="hc-numlbl">installs</div></div>
    </div>
    <div class="hc-bot">
      <div class="hc-car">${d.car.toUpperCase()}</div>
      <div class="hc-spec"><div>${d.l1}</div><div class="l2">${d.l2} <span style="color:#22c55e">✓</span></div></div>
      <div class="hc-foot">
        <div class="hc-film">${d.film}</div>
        <div class="hc-ver"><svg width="7" height="7" viewBox="0 0 9 9" fill="none"><path d="M1 4.5l2.5 2.5L8 1.5" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>Verified</div>
      </div>
    </div>
  </div>`;
}

function initHook(){
  const stage = document.getElementById('hookStage');
  const dots = document.getElementById('hookDots');
  if(!stage) return;
  stage.innerHTML = HOOK_CARDS.map(buildHookCard).join('');
  dots.innerHTML = HOOK_CARDS.map((_,i)=>`<div class="h1-dot${i===0?' on':''}"></div>`).join('');
  const cards = [...stage.querySelectorAll('.hook-card')];
  const dotEls = [...dots.querySelectorAll('.h1-dot')];
  cards[0].classList.add('show');
  setInterval(()=>{
    cards[hookIdx].classList.remove('show');
    dotEls[hookIdx].classList.remove('on');
    hookIdx = (hookIdx+1) % cards.length;
    cards[hookIdx].classList.add('show');
    dotEls[hookIdx].classList.add('on');
  }, 2800);
}

window.addEventListener('DOMContentLoaded', initHook);

// Route into job entry — no account yet, onboarding mode
function startRecord(){
  sessionStorage.setItem('sp_onboarding','1');
  window.location.href='shoppodium-logjob.html?onboard=1';
}

function transition(fromId,toId){
  const from=document.getElementById(fromId);
  from.style.transition='opacity .4s ease';
  from.style.opacity='0';
  setTimeout(()=>{
    from.classList.add('off');
    from.style.transition='';
    from.style.opacity='';
    const to=document.getElementById(toId);
    to.classList.remove('off');
    to.scrollTop=0;
  },400);
}

function setMode(mode){
  const isCreate=mode==='create';
  document.getElementById('createFields').style.display=isCreate?'block':'none';
  document.getElementById('signinFields').style.display=isCreate?'none':'block';
  document.getElementById('tabCreate').classList.toggle('on',isCreate);
  document.getElementById('tabSign').classList.toggle('on',!isCreate);
}

async function handleCreate(){
  const name=document.getElementById('fName').value.trim();
  const email=document.getElementById('fEmail').value.trim();
  const pass=document.getElementById('fPass').value;
  const err=document.getElementById('createErr');
  const btn=document.getElementById('createBtn');
  if(!name){err.textContent='Enter your name.';return;}
  if(!email){err.textContent='Enter your email.';return;}
  if(pass.length<8){err.textContent='Password must be at least 8 characters.';return;}
  err.textContent='';btn.disabled=true;btn.textContent='Creating account...';
  const{data,error}=await sb.auth.signUp({email,password:pass});
  if(error){
    const msg = error.message || '';
    if(msg.toLowerCase().includes('rate') || msg.toLowerCase().includes('limit') || msg.toLowerCase().includes('already registered')) {
      err.textContent = 'Account may already exist. Try signing in.';
    } else {
      err.textContent = msg;
    }
    btn.disabled=false;btn.textContent='Create account →';return;
  }
  if(data.user){
    await sb.from('profiles').upsert({id:data.user.id,full_name:name,shop_name:name,created_at:new Date().toISOString()});

    // Claim the pending install logged before signup
    let pendingJob=null;
    try{ pendingJob = JSON.parse(sessionStorage.getItem('sp_pending_job')||'null'); }catch(e){}
    if(pendingJob && data.session){
      pendingJob.tinter_id = data.user.id;
      try{
        await sb.from('jobs').insert(pendingJob);
        await sb.from('profiles').update({total_jobs:1}).eq('id',data.user.id);
      }catch(e){ console.warn('Job claim failed',e); }
      sessionStorage.removeItem('sp_pending_job');
      sessionStorage.removeItem('sp_onboarding');
    }

    if(data.session){
      btn.textContent='Welcome!';
      // Flag dashboard to play the 0→1 payoff animation
      sessionStorage.setItem('sp_first_job_celebrate','1');
      setTimeout(()=>window.location.href='app2.html',700);
    } else {
      document.getElementById('s3').innerHTML=`
        <div style="display:flex;flex-direction:column;justify-content:center;min-height:100vh;padding:52px 28px">
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:48px;font-weight:900;color:#22c55e;line-height:.86;letter-spacing:-.01em;margin-bottom:32px">Account<br>created.</div>
          <div style="height:1px;background:#1a1a1e;margin-bottom:32px"></div>
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:#fff;line-height:.92;margin-bottom:14px">Check your email</div>
          <div style="font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;color:#6b7280;line-height:1.7;margin-bottom:4px">We sent a confirmation link to</div>
          <div style="font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;color:#f0f0f2;margin-bottom:40px">${email}</div>
          <a href="shoppodium-signup.html" style="font-size:11px;font-weight:600;color:#252530;text-decoration:none;letter-spacing:.06em;text-transform:uppercase">Sign in →</a>
        </div>`;
    }
  }
}

async function handleSignin(){
  const email=document.getElementById('siEmail').value.trim();
  const pass=document.getElementById('siPass').value;
  const err=document.getElementById('signinErr');
  const btn=document.getElementById('signinBtn');
  if(!email||!pass){err.textContent='Enter your email and password.';return;}
  err.textContent='';btn.disabled=true;btn.textContent='Signing in...';
  const{error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){err.textContent=error.message;btn.disabled=false;btn.textContent='Sign in →';return;}
  window.location.href='app2.html';
}
</script>
</body>
</html>
